<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily</title>

<link rel="manifest" href="data:application/json,{
%22name%22:%22Brainplay Daily%22,
%22short_name%22:%22Brainplay%22
}" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#050510;
font-family:'Inter',sans-serif;
color:#fff;
display:flex;
justify-content:center;
padding:20px;
}

.container{max-width:520px;width:100%;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-radius:22px;
background:#0c0c18;
}

.logo{font-weight:900;}
.logo-text{
background:linear-gradient(90deg,#e879f9,#9333ea);
-webkit-background-clip:text;
color:transparent;
}

.title{text-align:center;margin-top:20px;}
.title h1{font-family:'Anton';font-size:42px;}

.stat{
margin:20px auto;
padding:12px;
border-radius:30px;
text-align:center;
background:#121226;
}

.image-box{
border-radius:24px;
overflow:hidden;
margin-top:20px;
}

.image-box img{
width:100%;
height:300px;
object-fit:cover;
}

/* ============================= */
/* SCORE CARD IMPROVED SECTION */
/* ============================= */

.result{
margin-top:20px;
padding:22px;
border-radius:22px;
background:linear-gradient(145deg,#121226,#0a0a18);
display:none;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
animation:fadeUp .3s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* NEW HEADING */
.score-title{
font-size:16px;
font-weight:700;
color:#9ca3af;
margin-bottom:12px;
text-align:left;
}

/* ROW */
.result-row{
display:flex;
align-items:center;
gap:14px;
}

/* ICON */
.circle{
width:64px;
height:64px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
flex-shrink:0;
}

.correct{
background:#22c55e;
box-shadow:0 0 25px rgba(34,197,94,0.7);
}

.wrong{
background:#ef4444;
box-shadow:0 0 25px rgba(239,68,68,0.7);
}

/* TITLE TEXT */
#title{
font-size:20px;
font-weight:800;
}

/* DESCRIPTION */
.desc-text{
margin-top:14px;
font-size:14px;
color:#e5e7eb;
line-height:1.5;
}

/* ============================= */

.buttons{
display:flex;
gap:12px;
margin-top:16px;
}

.btn{
flex:1;
padding:16px;
border-radius:18px;
font-weight:800;
border:none;
cursor:pointer;
color:#fff;
}

.btn-real{background:#16a34a;}
.btn-ai{background:#ef4444;}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🧠 <span class="logo-text">BRAINPLAY DAILY</span></div>
</div>

<div class="title">
<h1>REAL vs AI</h1>
</div>

<div class="stat">
🧩 Only <span id="percent">38%</span> players got this right!
</div>

<div class="image-box">
<img id="img">
</div>

<div class="buttons">
<button class="btn btn-real" onclick="answer('real')">REAL</button>
<button class="btn btn-ai" onclick="answer('ai')">AI</button>
</div>

<!-- ============================= -->
<!-- UPDATED SCORE CARD -->
<!-- ============================= -->

<div class="result" id="result">

<div class="score-title">📊 Score Card</div>

<div class="result-row">
<div id="circle" class="circle">✔</div>
<h3 id="title"></h3>
</div>

<p id="desc" class="desc-text"></p>

</div>

</div>

<script>
let isReal;

function load(){
document.getElementById("img").src="https://picsum.photos/800/600?random="+Math.random();
isReal=Math.random()>0.5;
document.getElementById("result").style.display="none";
}

function answer(choice){
let correct=(choice==="real"&&isReal)||(choice==="ai"&&!isReal);

let circle=document.getElementById("circle");
let title=document.getElementById("title");
let desc=document.getElementById("desc");

if(correct){
circle.className="circle correct";
circle.innerHTML="✔";
title.innerHTML="Correct!";
desc.innerHTML="Nice! You identified it correctly.";
}else{
circle.className="circle wrong";
circle.innerHTML="✖";
title.innerHTML="Wrong!";
desc.innerHTML="Oops! Better luck next time.";
}

document.getElementById("result").style.display="block";
}

load();
</script>

</body>
</html>
