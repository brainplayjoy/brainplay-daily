<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BrainPlay Daily — REAL vs AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #070714;
      font-family: 'Inter', sans-serif;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* main game container — inspired by the attached sleek card */
    .brain-card {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      background: #0F0F1A;
      border-radius: 56px;
      overflow: hidden;
      box-shadow: 0 30px 40px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }

    .card-container {
      padding: 28px 24px 34px;
    }

    /* header with BrainPlay + streak */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 18px 6px 14px;
      border-radius: 60px;
      backdrop-filter: blur(5px);
    }

    .brain-icon {
      font-size: 24px;
    }

    .logo-text {
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.3px;
      background: linear-gradient(125deg, #E2C6FF, #B77CFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .streak-pill {
      background: rgba(255, 180, 40, 0.12);
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 0.5px solid rgba(255, 200, 80, 0.3);
      color: #FFD966;
    }

    /* title real vs ai */
    .hero-title {
      text-align: center;
      margin: 10px 0 8px;
    }

    .duel {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -1px;
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .real-word {
      background: linear-gradient(125deg, #4ade80, #16a34a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 8px rgba(74, 222, 128, 0.3);
    }

    .vs-mid {
      font-size: 38px;
      font-weight: 800;
      color: #6F6F96;
    }

    .ai-word {
      background: linear-gradient(125deg, #f97316, #dc2626);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
    }

    .badge-daily {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #A5A5C3;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* stats like only 38% players */
    .stat-highlight {
      background: rgba(250, 204, 21, 0.1);
      border: 1px solid rgba(250, 204, 21, 0.25);
      border-radius: 100px;
      padding: 10px 18px;
      margin: 20px 0 20px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      color: #FACC15;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* image container */
    .image-frame {
      border-radius: 32px;
      overflow: hidden;
      background: #0A0A12;
      box-shadow: 0 20px 30px -12px black, inset 0 0 0 1px rgba(255, 255, 255, 0.07);
      margin-bottom: 6px;
    }

    #gameImage {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: all 0.2s;
    }

    /* question */
    .question-prompt {
      margin-top: 22px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      background: rgba(255, 255, 255, 0.02);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 6px 24px;
      border-radius: 40px;
      color: #D1D1F0;
    }

    /* buttons inspired by attached design: earthy green vs orange/red */
    .action-row {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .game-btn {
      flex: 1;
      border: none;
      font-weight: 800;
      font-size: 18px;
      padding: 16px 0;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
    }

    .btn-real {
      background: linear-gradient(105deg, #1F8A3E, #0E5624);
      color: white;
      border-bottom: 2px solid #86EFAC;
    }

    .btn-real:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 22px -6px rgba(34, 197, 94, 0.5);
    }

    .btn-ai {
      background: linear-gradient(105deg, #DC4A1A, #A82F0F);
      color: white;
      border-bottom: 2px solid #FCA5A5;
    }

    .btn-ai:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 22px -6px rgba(220, 74, 26, 0.5);
    }

    /* result panel (CORRECT / WRONG with explanation) */
    .result-card {
      margin-top: 24px;
      background: rgba(18, 18, 35, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 20px 18px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
      animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-icon-big {
      margin-bottom: 12px;
    }

    .badge-circle {
      width: 70px;
      height: 70px;
      margin: 0 auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .correct-bg {
      background: radial-gradient(circle at 30% 30%, #22c55e, #15803d);
      box-shadow: 0 0 28px #22c55e80;
    }

    .wrong-bg {
      background: radial-gradient(circle at 30% 30%, #ef4444, #9b1f1f);
      box-shadow: 0 0 28px #ef444480;
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 10px 0 6px;
    }

    .result-desc {
      font-size: 14px;
      color: #c1c1ec;
      max-width: 280px;
      margin: 8px auto 0;
      line-height: 1.45;
    }

    /* Professional waiting overlay / timer for next image */
    .waiting-overlay {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 14px 16px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: softGlow 1.2s infinite;
    }

    @keyframes softGlow {
      0% { border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 0 0px rgba(125, 125, 255, 0);}
      50% { border-color: rgba(160, 120, 255, 0.5); box-shadow: 0 0 12px rgba(100, 100, 255, 0.3);}
      100% { border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 0 0px rgba(125, 125, 255, 0);}
    }

    .waiting-text {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.2px;
      color: #E0E0FF;
    }

    .waiting-timer {
      font-family: monospace;
      font-weight: 800;
      font-size: 22px;
      background: rgba(255, 255, 255, 0.15);
      padding: 4px 14px;
      border-radius: 60px;
    }

    /* share section */
    .share-section {
      margin-top: 26px;
    }

    .share-flex {
      display: flex;
      gap: 14px;
    }

    .share-action {
      flex: 1;
      background: #202035;
      border: none;
      padding: 12px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 14px;
      color: #F0F0FF;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .whatsapp-action {
      background: linear-gradient(115deg, #25D366, #128C7E);
    }

    .share-action:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    /* hidden class */
    .hidden {
      display: none;
    }

    /* progress counter */
    .image-counter {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: #9F9FCD;
      background: rgba(0,0,0,0.3);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 4px 16px;
      border-radius: 100px;
    }

    button:active {
      transform: scale(0.97);
    }

    /* game over final result styling */
    .final-score-big {
      font-size: 32px;
      font-weight: 800;
    }
  </style>
</head>
<body>

<div class="brain-card">
  <div class="card-container">
    
    <!-- Header BRAINPLAY DAILY -->
    <div class="top-bar">
      <div class="logo-area">
        <span class="brain-icon">🧠</span>
        <span class="logo-text">BRAINPLAY DAILY</span>
      </div>
      <div class="streak-pill">
        🔥 STREAK 7
      </div>
    </div>

    <!-- Title: REAL vs AI looks like attached image -->
    <div class="hero-title">
      <div class="duel">
        <span class="real-word">REAL</span>
        <span class="vs-mid">vs</span>
        <span class="ai-word">AI</span>
      </div>
      <div class="badge-daily">⚡ CHALLENGE • DAILY #12</div>
    </div>

    <!-- stat pill -->
    <div class="stat-highlight">
      🧩 Only 38% players got this right today!
    </div>

    <!-- image container -->
    <div class="image-frame">
      <img id="gameImage" alt="Real or AI">
    </div>

    <!-- real / AI question prompt -->
    <div class="question-prompt">
      🤔 Is this image Real or AI?
    </div>

    <!-- green vs orange buttons like original design -->
    <div class="action-row">
      <button class="game-btn btn-real" id="realBtn" onclick="submitChoice('Real')">🌿 REAL</button>
      <button class="game-btn btn-ai" id="aiBtn" onclick="submitChoice('AI')">✨ AI</button>
    </div>

    <!-- result feedback card (correct/wrong and explanation) -->
    <div class="result-card" id="resultPanel">
      <div id="resultIconArea"></div>
      <div id="resultTitle" class="result-title"></div>
      <div id="resultExplanation" class="result-desc"></div>
    </div>

    <!-- dynamic waiting area (appears after answer) -->
    <div id="waitingContainer" class="hidden"></div>

    <!-- progress indicator -->
    <div class="image-counter" id="progressCounter"></div>

    <!-- share row -->
    <div class="share-section">
      <div class="share-flex">
        <button class="share-action" onclick="copyResults()">📋 COPY LINK</button>
        <button class="share-action whatsapp-action" onclick="shareToWhatsApp()">💬 SHARE ON WHATSAPP</button>
      </div>
    </div>

  </div>
</div>

<script>
  // ------------- GAME CONFIG -------------
  const TOTAL_IMAGES = 5;   // 5 images one by one
  let currentIndex = 0;
  let userScore = 0;
  let waitingTimeout = null;
  let isWaiting = false;         // to avoid double clicks while waiting
  let currentChoiceLock = false; // lock during result display & waiting

  // We'll store a set of random but consistent image URLs for each round?
  // Actually we want dynamic random images for each round but consistent during playthrough.
  let imageList = [];
  
  // Pre-fetch image URLs (so they change on each full game, but appear one by one)
  function generateImageSet() {
    const urls = [];
    for (let i = 0; i < TOTAL_IMAGES; i++) {
      urls.push("https://picsum.photos/800/600?random=" + Date.now() + i + Math.random() * 10000);
    }
    return urls;
  }
  
  // We'll create explanations for wrong answers (dynamic like "shadows are inconsistent" etc)
  // For authentic "REAL vs AI" we simulate plausible reasoning based on answer
  function getWrongExplanation(selectedAnswer) {
    const explanations = [
      "🧐 The texture patterns show typical AI smoothing — look at the edges and lighting inconsistency.",
      "📸 Real photo has natural grain and reflections. This one's artificially generated, notice the irregular shadow falloff.",
      "⚡ AI-generated artifacts: distorted fingers / background blur is unnatural and too uniform.",
      "🌿 This is a real photograph. The subtle noise and natural depth of field match organic camera capture.",
      "🤖 Fake details: repeating patterns and unnatural highlights are common in diffusion models."
    ];
    // randomize to keep fresh but coherent
    if (selectedAnswer === "Real") {
      return explanations[Math.floor(Math.random() * 3)] + " The lighting suggests AI synthesis, look at the reflections.";
    } else {
      return "✅ Actually this image is REAL. The tissue texture and lighting variations are authentic. AI often lacks such micro-details.";
    }
  }

  // Function to get correct explanation (when user clicks Real and image is Real etc.)
  // But note: in our game the "truth" is defined dynamically: we assign random but with pattern: we decide 50% real 50% AI?
  // For *real* experience we pre-define truth for each image: but to match "Real vs AI" we will randomly assign status.
  // However we want the game to be unpredictable: each image gets random truth (Real or AI) dynamically, but we store it.
  let groundTruth = []; // true for REAL image, false for AI image
  
  function initGameSession() {
    currentIndex = 0;
    userScore = 0;
    if (waitingTimeout) clearTimeout(waitingTimeout);
    isWaiting = false;
    currentChoiceLock = false;
    
    // generate new images and random ground truths (real/ai)
    imageList = [];
    groundTruth = [];
    for (let i = 0; i < TOTAL_IMAGES; i++) {
      imageList.push("https://picsum.photos/800/600?random=" + Date.now() + i + Math.random() * 999999);
      // Randomize REAL / AI: true = REAL, false = AI
      const isReal = Math.random() < 0.5;   // some images are real, some AI (for guessing fun)
      groundTruth.push(isReal);
    }
    
    // hide result panel, clear waiting container
    const resultPanel = document.getElementById("resultPanel");
    if (resultPanel) resultPanel.style.display = "none";
    const waitingDiv = document.getElementById("waitingContainer");
    if (waitingDiv) waitingDiv.innerHTML = "";
    waitingDiv.classList.add("hidden");
    
    updateProgressText();
    loadCurrentImage();
  }
  
  function updateProgressText() {
    const progElem = document.getElementById("progressCounter");
    if (progElem) {
      progElem.innerText = `📸 Image ${currentIndex+1} of ${TOTAL_IMAGES}`;
    }
  }
  
  function loadCurrentImage() {
    if (currentIndex >= TOTAL_IMAGES) {
      endGameSession();
      return;
    }
    const imgElement = document.getElementById("gameImage");
    if (imgElement && imageList[currentIndex]) {
      imgElement.src = imageList[currentIndex];
      imgElement.onerror = () => {
        imgElement.src = "https://picsum.photos/800/600?fallback=1";
      };
    }
    updateProgressText();
    // enable buttons
    const realBtn = document.getElementById("realBtn");
    const aiBtn = document.getElementById("aiBtn");
    if (realBtn) realBtn.disabled = false;
    if (aiBtn) aiBtn.disabled = false;
    // remove any waiting overlay visual
    const waitingDiv = document.getElementById("waitingContainer");
    if (waitingDiv) {
      waitingDiv.classList.add("hidden");
      waitingDiv.innerHTML = "";
    }
    const resultPanel = document.getElementById("resultPanel");
    if (resultPanel) resultPanel.style.display = "none";
    isWaiting = false;
    currentChoiceLock = false;
  }
  
  // when user selects an answer
  function submitChoice(selected) {
    if (isWaiting || currentChoiceLock) return;
    if (currentIndex >= TOTAL_IMAGES) return;
    
    const isRealImage = groundTruth[currentIndex];
    const isCorrect = (selected === "Real" && isRealImage === true) || (selected === "AI" && isRealImage === false);
    
    // lock UI
    currentChoiceLock = true;
    const realBtn = document.getElementById("realBtn");
    const aiBtn = document.getElementById("aiBtn");
    if (realBtn) realBtn.disabled = true;
    if (aiBtn) aiBtn.disabled = true;
    
    // update score if correct
    if (isCorrect) {
      userScore++;
    }
    
    // show result panel with icon, title and explanation
    const resultPanel = document.getElementById("resultPanel");
    const iconArea = document.getElementById("resultIconArea");
    const resultTitle = document.getElementById("resultTitle");
    const resultExplanation = document.getElementById("resultExplanation");
    
    if (isCorrect) {
      // CORRECT case (from image style)
      iconArea.innerHTML = `
        <div class="result-icon-big">
          <div class="badge-circle correct-bg">
            <svg width="40" height="40" viewBox="0 0 52 52" fill="none">
              <path d="M14 27 L22 35 L38 18" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      `;
      resultTitle.innerHTML = "🎉 CORRECT! 🎉";
      if (isRealImage) {
        resultExplanation.innerHTML = "✔️ This image is REAL. Natural lighting, subtle grain and organic textures confirm authenticity.";
      } else {
        resultExplanation.innerHTML = "🤖 You nailed it! This is AI-generated. The smooth gradients and unnatural edge transitions are typical for synthetic images.";
      }
    } else {
      // WRONG case with professional wrong explanation
      iconArea.innerHTML = `
        <div class="result-icon-big">
          <div class="badge-circle wrong-bg">
            <span style="font-size:42px; font-weight:800;">✘</span>
          </div>
        </div>
      `;
      resultTitle.innerHTML = "❌ WRONG";
      // detailed explanation based on what the correct answer was
      const correctAnswer = isRealImage ? "REAL" : "AI";
      let detailMsg = "";
      if (isRealImage) {
        detailMsg = "This image is actually REAL. Look at the organic reflections, subtle chromatic aberration and natural depth — AI can't perfectly replicate these. Shadows also follow realistic physics.";
      } else {
        detailMsg = "The image is AI-GENERATED. Artifacts like inconsistent hair textures, surreal lighting, and weird pattern repetitions give it away. Generative models often struggle with fine details.";
      }
      resultExplanation.innerHTML = `💡 Oops! The correct answer is ${correctAnswer}. ${detailMsg}`;
    }
    
    resultPanel.style.display = "block";
    
    // after showing result, start 5 sec waiting timer before loading next image
    startWaitingForNextImage();
  }
  
  function startWaitingForNextImage() {
    let secondsLeft = 5;
    const waitingDiv = document.getElementById("waitingContainer");
    waitingDiv.classList.remove("hidden");
    waitingDiv.innerHTML = `
      <div class="waiting-overlay">
        <span class="waiting-text">⏳ Next image in</span>
        <span class="waiting-timer" id="waitTimerSeconds">5s</span>
        <span class="waiting-text">🎯 get ready</span>
      </div>
    `;
    isWaiting = true;
    
    const timerSpan = document.getElementById("waitTimerSeconds");
    const interval = setInterval(() => {
      if (!isWaiting) {
        clearInterval(interval);
        return;
      }
      secondsLeft--;
      if (timerSpan) timerSpan.innerText = secondsLeft + "s";
      if (secondsLeft <= 0) {
        clearInterval(interval);
        // move to next image
        moveToNextImage();
      }
    }, 1000);
    
    // store interval to clear if needed
    waitingDiv._countInterval = interval;
  }
  
  function moveToNextImage() {
    // clean waiting container
    const waitingDiv = document.getElementById("waitingContainer");
    if (waitingDiv._countInterval) clearInterval(waitingDiv._countInterval);
    waitingDiv.classList.add("hidden");
    waitingDiv.innerHTML = "";
    isWaiting = false;
    
    // move index
    currentIndex++;
    updateProgressText();
    
    if (currentIndex < TOTAL_IMAGES) {
      loadCurrentImage();
    } else {
      // game finished
      endGameSession();
    }
  }
  
  function endGameSession() {
    const resultPanel = document.getElementById("resultPanel");
    const iconArea = document.getElementById("resultIconArea");
    const resultTitle = document.getElementById("resultTitle");
    const resultExplanation = document.getElementById("resultExplanation");
    const waitingDiv = document.getElementById("waitingContainer");
    waitingDiv.classList.add("hidden");
    if (waitingDiv._countInterval) clearInterval(waitingDiv._countInterval);
    
    // disable buttons
    const realBtn = document.getElementById("realBtn");
    const aiBtn = document.getElementById("aiBtn");
    if (realBtn) realBtn.disabled = true;
    if (aiBtn) aiBtn.disabled = true;
    
    // Show final score
    iconArea.innerHTML = `<div style="font-size:52px;">🏆</div>`;
    resultTitle.innerHTML = `🔥 FINAL SCORE: ${userScore}/${TOTAL_IMAGES}`;
    let message = "";
    if (userScore === TOTAL_IMAGES) message = "Perfect! You're a pro at spotting Real vs AI! 🔥";
    else if (userScore >= 3) message = "Good eye! Train more to beat the AI challenge.";
    else message = "Keep practicing! Every image sharpens your intuition.";
    resultExplanation.innerHTML = `${message} Share your result with friends.`;
    resultPanel.style.display = "block";
    
    // Show progress final
    const progElem = document.getElementById("progressCounter");
    if (progElem) progElem.innerText = `🎮 Game Over · Score ${userScore}/${TOTAL_IMAGES}`;
    currentChoiceLock = true;
    isWaiting = false;
  }
  
  // share functions (non-intrusive)
  function copyResults() {
    const textToCopy = `🧠 BRAINPLAY DAILY | REAL vs AI Challenge 🎯 My score: ${userScore}/${TOTAL_IMAGES}! Can you beat me? ${location.href}`;
    navigator.clipboard.writeText(textToCopy);
    alert("✅ Score copied! Share with friends.");
  }
  
  function shareToWhatsApp() {
    const text = `🔥 BRAINPLAY DAILY — REAL vs AI 🔥 I scored ${userScore}/${TOTAL_IMAGES} points! Test your observation: ${location.href}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
  }
  
  // Re-initialize the entire game when page loads
  window.addEventListener("load", () => {
    initGameSession();
  });
  
  // Global functions for inline buttons
  window.submitChoice = submitChoice;
  window.copyResults = copyResults;
  window.shareToWhatsApp = shareToWhatsApp;
</script>
</body>
</html>
