<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainPlay Daily</title>

    <!-- Minimal PWA manifest -->
    <link rel="manifest" href="data:application/json,{
        %22name%22: %22Brainplay Daily%22,
        %22short_name%22: %22Brainplay%22,
        %22description%22: %22Real vs AI image game%22,
        %22start_url%22: %22.%22,
        %22display%22: %22standalone%22,
        %22background_color%22: %22#050510%22,
        %22theme_color%22: %22#050510%22
    }" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background:#050510;
            font-family:'Inter',sans-serif;
            color:#fff;
            display:flex;
            justify-content:center;
            padding:20px;
        }

        .container { max-width:520px; width:100%; }

        .header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 18px;
            border-radius:22px;
            background:#0c0c18;
        }

        .logo { display:flex; gap:10px; font-weight:900; }

        .logo-text {
            background:linear-gradient(90deg,#e879f9,#9333ea);
            -webkit-background-clip:text;
            color:transparent;
        }

        .pill {
            padding:8px 12px;
            border-radius:12px;
            background:#121226;
            font-size:13px;
            font-weight:700;
            margin-left:6px;
        }

        .title { text-align:center; margin-top:20px; }

        .title h1 { font-family:'Anton'; font-size:42px; }

        .real { color:#fff; text-shadow:0 0 12px cyan; }
        .ai { color:#ff3b3b; text-shadow:0 0 12px red; }

        .subtitle { color:#9ca3af; }

        .stat {
            margin:20px auto;
            padding:12px;
            border-radius:30px;
            text-align:center;
            background:#121226;
        }

        .highlight { color:#facc15; font-weight:800; }

        .image-box {
            border-radius:24px;
            overflow:hidden;
            margin-top:20px;
            position:relative;
        }

        .image-box img {
            width:100%;
            height:300px;
            object-fit:cover;
        }

        .final-overlay {
            position:absolute;
            inset:0;
            background:#050510;
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .start-btn {
            margin-top:14px;
            background:orange;
            color:#fff;
            padding:12px 18px;
            border:none;
            border-radius:12px;
            font-weight:700;
        }

        .image-footer {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:10px;
        }

        .counter { font-weight:700; color:#d1d5db; }
        .question-inline { flex:1; text-align:center; }

        .next-btn {
            background:none;
            border:none;
            color:#facc15;
            font-weight:800;
            cursor:pointer;
            display:none;
        }

        .buttons { display:flex; gap:12px; margin-top:16px; }

        .btn {
            flex:1;
            padding:16px;
            border-radius:18px;
            font-weight:800;
            border:none;
            color:#fff;
            cursor:pointer;
        }

        .btn:disabled { opacity:.5; }

        .btn-real { background:linear-gradient(#16a34a,#065f46); }
        .btn-ai { background:linear-gradient(#ef4444,#7f1d1d); }

        .footer {
            margin-top:20px;
            text-align:center;
            color:#9ca3af;
        }
    </style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🧠 <span class="logo-text">BRAINPLAY DAILY</span></div>
<div>
<span class="pill">🔥 7</span>
<span class="pill">#12</span>
</div>
</div>

<div class="title">
<h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
<div class="subtitle">Can you spot the difference?</div>
</div>

<div class="stat">
🧩 Only <span class="highlight" id="percent">38%</span> players got this right today!
</div>

<div class="image-box">
<img id="img">

<div class="final-overlay" id="finalOverlay">
<h2 id="finalText"></h2>
<button class="start-btn" onclick="restart()">Start New</button>
</div>
</div>

<div class="image-footer">
<span class="counter" id="counter">1/5</span>
<span class="question-inline">🤔 Is this image Real or AI?</span>
<button class="next-btn" id="nextBtn" onclick="next()">>> NEXT</button>
</div>

<div class="buttons">
<button class="btn btn-real" id="btnReal" onclick="answer('real')">REAL</button>
<button class="btn btn-ai" id="btnAi" onclick="answer('ai')">AI</button>
</div>

<!-- RESULT CARD REMOVED -->

<div class="footer">
🧠 Save to phone for daily challenge
</div>

</div>

<script>
let index=0;
let score=0;
let isReal;
let answered=false;

const btnReal=document.getElementById('btnReal');
const btnAi=document.getElementById('btnAi');
const nextBtn=document.getElementById('nextBtn');
const counterEl=document.getElementById('counter');

function disableButtons(){
answered=true;
btnReal.disabled=true;
btnAi.disabled=true;
}

function enableButtons(){
answered=false;
btnReal.disabled=false;
btnAi.disabled=false;
}

function getRandomImage(){
return "https://picsum.photos/800/600?random="+Math.random();
}

function load(){
document.getElementById("img").src=getRandomImage();
isReal=Math.random()>0.5;
counterEl.innerText=(index+1)+"/5";
nextBtn.style.display="none";
enableButtons();
}

function answer(choice){
if(answered)return;
disableButtons();

let correct=(choice==="real"&&isReal)||(choice==="ai"&&!isReal);
if(correct)score++;

nextBtn.style.display="inline-block";
}

function next(){
index++;
if(index>=5){showFinal();}
else{load();}
}

function showFinal(){
let text="";
if(score<=2)text="😐 Poor ("+score+"/5)";
else if(score<=4)text="👍 Good ("+score+"/5)";
else text="🏆 Excellent ("+score+"/5)";

document.getElementById("finalText").innerHTML=text;
document.getElementById("finalOverlay").style.display="flex";
disableButtons();
nextBtn.style.display="none";
}

function restart(){
index=0;
score=0;
document.getElementById("finalOverlay").style.display="none";
load();
}

document.getElementById("percent").innerText=Math.floor(Math.random()*50+30)+"%";

load();
</script>

</body>
</html>
