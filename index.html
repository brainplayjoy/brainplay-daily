<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainPlay Daily - Real vs AI</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 18px;
  width: 340px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.logo {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 5px;
}

.tagline {
  font-size: 14px;
  color: #777;
  margin-bottom: 15px;
}

img {
  width: 100%;
  border-radius: 12px;
  margin: 15px 0;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.real {
  background: #4CAF50;
  color: white;
}

.ai {
  background: #ff4d4d;
  color: white;
}

button:hover {
  transform: scale(1.05);
}

#result {
  margin-top: 15px;
  font-weight: 600;
  font-size: 18px;
}

.share {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.share button {
  flex: 1;
  background: #333;
  color: white;
}

.whatsapp {
  background: #25D366 !important;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">🧠 BrainPlay Daily</div>
  <div class="tagline">Real vs AI Challenge</div>

  <img id="gameImage" src="https://via.placeholder.com/300">

  <div class="buttons">
    <button class="real" onclick="check('Real')">Real</button>
    <button class="ai" onclick="check('AI')">AI</button>
  </div>

  <div id="result"></div>

  <div class="share">
    <button onclick="copyResult()">Copy</button>
    <button class="whatsapp" onclick="shareWhatsApp()">WhatsApp</button>
  </div>

</div>

<script>
const data = [
  {
    img: "https://via.placeholder.com/300",
    answer: "AI"
  },
  {
    img: "https://via.placeholder.com/300/ff0000",
    answer: "Real"
  }
];

const index = Math.floor(Date.now()/86400000) % data.length;

document.getElementById("gameImage").src = data[index].img;

let userResult = "";

function check(choice) {
  if (choice === data[index].answer) {
    userResult = "✅ Correct!";
  } else {
    userResult = "❌ Wrong!";
  }
  document.getElementById("result").innerText = userResult;
}

function copyResult() {
  const text = `I played Real vs AI on BrainPlay Daily! ${userResult} Try it: ${window.location.href}`;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function shareWhatsApp() {
  const text = `I played Real vs AI on BrainPlay Daily! ${userResult} Try it: ${window.location.href}`;
  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}
</script>

</body>
</html>
