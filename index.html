<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background: radial-gradient(circle at top,#020617,#000);
color:#fff;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:20px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:20px;
font-weight:800;
color:#c084fc;
}

.stats{
display:flex;
gap:10px;
}

.stat{
padding:10px 14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
font-size:12px;
}

/* TITLE */
.title{
text-align:center;
margin:25px 0 10px;
}

.title h1{
font-size:34px;
margin:0;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.sub{
color:#9ca3af;
}

/* PERCENT BADGE */
.percent{
margin:15px auto;
padding:10px 15px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
width:85%;
text-align:center;
color:#eab308;
}

/* IMAGE */
.image-box img{
width:100%;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* QUESTION TEXT */
.question{
margin-top:20px;
font-size:16px;
color:#ddd;
}

/* BUTTONS */
.buttons{
display:flex;
gap:12px;
margin-top:12px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:800;
cursor:pointer;
transition:.3s;
}

.real{
background:linear-gradient(45deg,#22c55e,#16a34a);
box-shadow:0 0 15px rgba(34,197,94,0.6);
}

.ai{
background:linear-gradient(45deg,#ef4444,#dc2626);
box-shadow:0 0 15px rgba(239,68,68,0.6);
}

button:hover{
transform:scale(1.06);
}

/* RESULT CARD */
.result{
margin-top:18px;
padding:16px;
border-radius:18px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
display:none;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.correct{color:#22c55e;}
.wrong{color:#ef4444;}

/* CONFETTI */
.confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.confetti span{
position:absolute;
width:6px;
height:6px;
background:#22c55e;
animation:fall 2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10px);}
100%{transform:translateY(100vh);}
}

/* SHARE */
.share{
margin-top:20px;
}

.share-title{
text-align:center;
margin-bottom:10px;
}

.share-buttons{
display:flex;
gap:10px;
}

.copy{
background:#1e293b;
color:#fff;
}

.whatsapp{
background:linear-gradient(45deg,#25D366,#128C7E);
color:#fff;
font-weight:700;
}

/* TIMER */
.timer{
margin-top:20px;
padding:15px;
border-radius:16px;
background:rgba(255,255,255,0.05);
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🧠 BrainPlay</div>
<div class="stats">
<div class="stat">🔥 7</div>
<div class="stat">📅 #12</div>
</div>
</div>

<div class="title">
<h1><span class="green">REAL</span> vs <span class="red">AI</span></h1>
<div class="sub">Can you spot the difference?</div>
</div>

<div class="percent">👥 Only <b>38%</b> players got this right today!</div>

<div class="image-box">
<img id="gameImage">
</div>

<div class="question">Is this image Real or AI?</div>

<div class="buttons">
<button class="real" onclick="check('Real')">🌿 REAL</button>
<button class="ai" onclick="check('AI')">🤖 AI</button>
</div>

<div class="result" id="resultBox">
<div id="resultText"></div>
<div id="explanation"></div>
<br>
<button class="copy">💡 Learn More</button>
</div>

<div class="share">
<div class="share-title">🔗 Share your result with friends!</div>
<div class="share-buttons">
<button class="copy" onclick="copyResult()">📋 Copy Link</button>
<button class="whatsapp" onclick="shareWhatsApp()">🟢 WhatsApp</button>
</div>
</div>

<div class="timer">
⏱️ Next challenge in <br>
<b id="countdown"></b>
</div>

</div>

<script>

const data=[
{img:"images/1.jpg",answer:"Real",exp:"Natural lighting and realistic imperfections."},
{img:"images/2.jpg",answer:"AI",exp:"Overly smooth textures and artificial feel."},
{img:"images/3.jpg",answer:"AI",exp:"Too perfect to be natural."}
];

let current=0,score=0;

function load(){
document.getElementById("gameImage").src=data[current].img;
}

function check(choice){
let q=data[current];

let result=document.getElementById("resultBox");
let text=document.getElementById("resultText");

if(choice===q.answer){
score++;
text.innerHTML="<div class='correct'>✅ CORRECT!</div>";
confetti();
}else{
text.innerHTML="<div class='wrong'>❌ WRONG!</div>";
}

document.getElementById("explanation").innerText=q.exp;
result.style.display="block";

}

function confetti(){
let c=document.createElement("div");
c.className="confetti";
for(let i=0;i<40;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
c.appendChild(s);
}
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}

function copyResult(){
let text=`I scored ${score}/3 🔥 Try this game: ${location.href}`;
navigator.clipboard.writeText(text);
alert("Copied!");
}

function shareWhatsApp(){
let text=`I scored ${score}/3 🔥 Try this game: ${location.href}`;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// TIMER
function timer(){
let now=new Date();
let next=new Date();
next.setHours(24,0,0,0);

let diff=next-now;

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
`${h}h : ${m}m : ${s}s`;
}
setInterval(timer,1000);

load();

</script>

</body>
</html>
