<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050510;
  font-family:'Inter',sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{max-width:520px;width:100%}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-radius:22px;
  background:#0c0c18;
  border:1px solid rgba(255,255,255,0.08);
}

.logo{display:flex;gap:10px;font-weight:900}
.logo-text{
  background:linear-gradient(90deg,#e879f9,#9333ea);
  -webkit-background-clip:text;
  color:transparent;
}

.pill{
  padding:8px 12px;
  border-radius:12px;
  background:#121226;
  font-size:13px;
  font-weight:700;
}

.title{text-align:center;margin-top:20px}

.title h1{
  font-family:'Anton',sans-serif;
  font-size:56px;
}

.real{color:#fff;text-shadow:0 0 12px cyan}
.ai{color:#ff3b3b;text-shadow:0 0 12px red}

.subtitle{color:#9ca3af}

.hook{
  margin-top:10px;
  text-align:center;
  font-weight:700;
  color:#facc15;
}

.stat{
  margin:20px auto;
  padding:12px;
  border-radius:30px;
  text-align:center;
  background:#121226;
}

.timer{
  height:6px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.timer-fill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#22c55e,#ef4444);
}

.image-box{
  border-radius:24px;
  overflow:hidden;
  margin-top:20px;
  position:relative;
}

.image-box img{
  width:100%;
  height:320px;
  object-fit:cover;
}

.final-overlay{
  position:absolute;
  inset:0;
  background:#050510;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.start-btn{
  margin-top:14px;
  background:orange;
  color:#fff;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.question{
  text-align:center;
  margin-top:18px;
  font-weight:700;
}

.buttons{display:flex;gap:12px;margin-top:16px}

.btn{
  flex:1;
  padding:16px;
  border-radius:18px;
  font-weight:800;
  border:none;
  cursor:pointer;
  color:#fff;
  transition:transform 0.1s;
}

.btn:active{transform:scale(0.95)}

.btn-real{background:linear-gradient(#16a34a,#065f46)}
.btn-ai{background:linear-gradient(#ef4444,#7f1d1d)}

.result{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:#121226;
  display:none;
}

.circle{
  width:60px;height:60px;border-radius:50%;
  display:flex;justify-content:center;align-items:center;font-size:28px;
}

.correct{background:#22c55e}
.wrong{background:#ef4444}

.next{
  margin-left:auto;
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  color:#facc15;
  border:none;
  cursor:pointer;
}

#motivation{margin-top:10px;color:#facc15;font-weight:700}

.final-score{font-size:28px;font-weight:900}
.rating{color:#facc15;margin-top:6px}

.percentile{margin-top:6px;color:#22c55e;font-weight:700}
.leaderboard{margin-top:10px;color:#9ca3af;font-size:14px}

.share{margin-top:20px}
.share-buttons{display:flex;gap:10px;margin-top:10px}

.share-btn{
  flex:1;padding:12px;border-radius:12px;border:none;
  font-weight:700;cursor:pointer;
}

.copy{background:#1f2937;color:#fff}
.whatsapp{background:#25D366;color:#fff}

.footer{
  margin-top:20px;
  text-align:center;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">🧠 <span class="logo-text">BRAINPLAY DAILY</span></div>
  <div>
    <span class="pill">🔥 <span id="streak">1</span></span>
    <span class="pill">🏆 <span id="best">0</span>/5</span>
  </div>
</div>

<div class="title">
  <h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
  <div class="subtitle">Can you spot the difference?</div>
  <div class="hook">⚡ Only 3% reach Genius level</div>
</div>

<div class="stat">
  🧩 Only <span id="percent"></span> got this right today!
</div>

<div class="timer"><div id="timer" class="timer-fill"></div></div>

<div class="image-box">
  <img id="img">
  <div class="final-overlay" id="finalOverlay">
    <div class="final-score" id="finalText"></div>
    <div class="rating" id="rating"></div>
    <div class="percentile" id="percentile"></div>
    <div class="leaderboard">
      🔝 Top Score Today: 5/5<br>
      📊 Avg Score: 2.8
    </div>
    <button class="start-btn" onclick="restart()">Try Again</button>
  </div>
</div>

<div class="question">🤔 Real or AI?</div>

<div class="buttons">
  <button class="btn btn-real" onclick="answer('real')">REAL</button>
  <button class="btn btn-ai" onclick="answer('ai')">AI</button>
</div>

<div class="result" id="result">
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="circle" class="circle">✔</div>
    <h3 id="title"></h3>
    <button class="next" onclick="next()">NEXT →</button>
  </div>
  <p id="desc"></p>
  <p id="motivation"></p>
</div>

<div class="share">
  <div class="share-buttons">
    <button class="share-btn copy" onclick="copyLink()">Copy Link</button>
    <button class="share-btn whatsapp" onclick="shareWA()">WhatsApp</button>
  </div>
</div>

<div class="footer">Play daily. Improve your brain.</div>

</div>

<script>

let index=0,score=0,isReal;

let bestScore = localStorage.getItem("bestScore") || 0;
let streak = localStorage.getItem("streak") || 1;

document.getElementById("best").innerText=bestScore;
document.getElementById("streak").innerText=streak;

function getRandomImage(){
  return "https://picsum.photos/800/600?random="+Math.random();
}

function startTimer(){
  let bar=document.getElementById("timer");
  bar.style.transition="none";
  bar.style.width="100%";
  setTimeout(()=>{
    bar.style.transition="width 5s linear";
    bar.style.width="0%";
  },50);
}

function load(){
  document.getElementById("img").src=getRandomImage();
  isReal=Math.random()>0.5;
  document.getElementById("result").style.display="none";
  startTimer();
}

function answer(choice){
  let correct=(choice==="real"&&isReal)||(choice==="ai"&&!isReal);

  let circle=document.getElementById("circle");
  let title=document.getElementById("title");
  let desc=document.getElementById("desc");

  if(correct){
    score++;
    circle.className="circle correct";
    circle.innerHTML="✔";
    title.innerHTML="Correct!";
    desc.innerHTML="Good eye!";
  }else{
    circle.className="circle wrong";
    circle.innerHTML="✖";
    title.innerHTML="Wrong!";
    desc.innerHTML="That was AI.";
  }

  document.getElementById("motivation").innerText=
    "Beat your best score: "+bestScore;

  document.getElementById("result").style.display="block";
}

function next(){
  index++;
  if(index>=5){showFinal()} else load();
}

function showFinal(){

  if(score>bestScore){
    bestScore=score;
    localStorage.setItem("bestScore",bestScore);
  }

  streak++;
  localStorage.setItem("streak",streak);

  document.getElementById("best").innerText=bestScore;
  document.getElementById("streak").innerText=streak;

  let ratingText= score<=2?"😐 Needs Practice":score<=4?"👍 Sharp Mind":"🏆 Genius";

  let percentile=Math.floor(Math.random()*30+60);

  document.getElementById("finalText").innerHTML=score+"/5";
  document.getElementById("rating").innerHTML=ratingText;
  document.getElementById("percentile").innerHTML=
    "You scored better than "+percentile+"% players";

  document.getElementById("finalOverlay").style.display="flex";
}

function restart(){
  index=0;score=0;
  document.getElementById("finalOverlay").style.display="none";
  load();
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

function shareWA(){
  let text="I scored "+score+"/5 in BrainPlay! Can you beat me? "+location.href;
  window.open("https://wa.me/?text="+encodeURIComponent(text));
}

document.getElementById("percent").innerText=
  Math.floor(Math.random()*50+30)+"%";

load();

</script>

</body>
</html>
