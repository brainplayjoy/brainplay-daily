<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily — REAL vs AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#060612;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:#fff;
}

/* MAIN CARD */
.brain-card{
  width:100%;
  max-width:520px;
  background:#0b0b18;
  border-radius:36px;
  padding:24px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

/* HEADER */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
  font-size:20px;
  color:#c084fc;
}

.logo span{
  background:linear-gradient(90deg,#e879f9,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
}

.pill{
  display:flex;
  gap:10px;
}

.badge{
  background:#121226;
  padding:10px 16px;
  border-radius:18px;
  font-weight:700;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:6px;
  border:1px solid rgba(255,255,255,0.08);
}

.streak{ color:#facc15;}
.challenge{ color:#a78bfa;}

/* TITLE */
.hero{
  text-align:center;
  margin-bottom:12px;
}

.hero h1{
  font-size:48px;
  font-weight:900;
}

.real{
  color:#22c55e;
}
.ai{
  color:#ef4444;
}

.sub{
  color:#9ca3af;
  margin-top:6px;
  font-size:14px;
}

/* STATS */
.stat{
  margin:16px auto;
  background:#111126;
  padding:10px 18px;
  border-radius:30px;
  text-align:center;
  font-weight:600;
  font-size:14px;
  border:1px solid rgba(255,255,255,0.08);
}

/* IMAGE */
.image-box{
  border-radius:24px;
  overflow:hidden;
  margin:16px 0;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.image-box img{
  width:100%;
  display:block;
}

/* QUESTION */
.question{
  text-align:center;
  font-weight:700;
  margin:12px 0;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:14px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:16px;
  border:none;
  border-radius:20px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
}

.btn-real{
  background:linear-gradient(135deg,#10b981,#065f46);
  box-shadow:0 10px 20px rgba(16,185,129,0.3);
}

.btn-ai{
  background:linear-gradient(135deg,#ef4444,#7f1d1d);
  box-shadow:0 10px 20px rgba(239,68,68,0.3);
}

.btn:hover{
  transform:translateY(-2px);
}

/* RESULT CARD */
.result{
  margin-top:20px;
  background:#121226;
  border-radius:24px;
  padding:20px;
  display:none;
  text-align:center;
}

.result h2{
  font-size:24px;
  margin:10px 0;
}

.result p{
  color:#cbd5f5;
  font-size:14px;
}

/* SHARE */
.share{
  margin-top:20px;
}

.share-title{
  text-align:center;
  margin-bottom:10px;
  color:#9ca3af;
}

.share-buttons{
  display:flex;
  gap:12px;
}

.share-btn{
  flex:1;
  padding:12px;
  border-radius:16px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.copy{
  background:#1f2937;
  color:#fff;
}

.whatsapp{
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;
}

</style>
</head>

<body>

<div class="brain-card">

  <!-- HEADER -->
  <div class="top-bar">
    <div class="logo">🧠 <span>BRAINPLAY</span></div>
    <div class="pill">
      <div class="badge streak">🔥 7</div>
      <div class="badge challenge">📅 #12</div>
    </div>
  </div>

  <!-- TITLE -->
  <div class="hero">
    <h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
    <div class="sub">Can you spot the difference?</div>
  </div>

  <!-- STAT -->
  <div class="stat">🧩 Only 38% players got this right today!</div>

  <!-- IMAGE -->
  <div class="image-box">
    <img id="gameImage" src="https://picsum.photos/800/600" />
  </div>

  <!-- QUESTION -->
  <div class="question">Is this image Real or AI?</div>

  <!-- BUTTONS -->
  <div class="actions">
    <button class="btn btn-real" onclick="submitChoice('Real')">🌿 REAL</button>
    <button class="btn btn-ai" onclick="submitChoice('AI')">🤖 AI</button>
  </div>

  <!-- RESULT -->
  <div class="result" id="resultBox">
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>
  </div>

  <!-- SHARE -->
  <div class="share">
    <div class="share-title">Share your result with friends!</div>
    <div class="share-buttons">
      <button class="share-btn copy" onclick="copyResults()">📋 COPY LINK</button>
      <button class="share-btn whatsapp" onclick="shareWhatsApp()">💬 WHATSAPP</button>
    </div>
  </div>

</div>

<script>

let isReal = Math.random() > 0.5;

function submitChoice(choice){
  const resultBox = document.getElementById("resultBox");
  const title = document.getElementById("resultTitle");
  const text = document.getElementById("resultText");

  let correct = (choice === "Real" && isReal) || (choice === "AI" && !isReal);

  if(correct){
    title.innerHTML = "✅ CORRECT!";
    text.innerHTML = isReal
      ? "This image is REAL. Natural lighting and textures match real-world physics."
      : "This image is AI-generated. Smooth gradients and artificial patterns reveal it.";
  } else {
    title.innerHTML = "❌ WRONG";
    text.innerHTML = isReal
      ? "This was REAL. Notice natural imperfections and lighting depth."
      : "This was AI. Look for repeating textures and unnatural edges.";
  }

  resultBox.style.display = "block";
}

function copyResults(){
  navigator.clipboard.writeText(window.location.href);
  alert("Copied!");
}

function shareWhatsApp(){
  window.open("https://wa.me/?text=Try this game: "+window.location.href);
}

</script>

</body>
</html>
