<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BrainPlay Daily | Real vs AI Game</title>

    <!-- Minimal PWA manifest (triggers install prompt) -->
    <link rel="manifest" href="data:application/json,{
        %22name%22: %22Brainplay Daily%22,
        %22short_name%22: %22Brainplay%22,
        %22description%22: %22Real vs AI image game%22,
        %22start_url%22: %22.%22,
        %22display%22: %22standalone%22,
        %22background_color%22: %22#050510%22,
        %22theme_color%22: %22#050510%22,
        %22icons%22: [{
            %22src%22: %22data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E🧠%3C/text%3E%3C/svg%3E%22,
            %22sizes%22: %22any%22,
            %22type%22: %22image/svg+xml%22
        }]
    }" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 520px;
            width: 100%;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-radius: 22px;
            background: #0c0c18;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            display: flex;
            gap: 10px;
            font-weight: 900;
        }

        .logo-text {
            background: linear-gradient(90deg, #e879f9, #9333ea);
            -webkit-background-clip: text;
            color: transparent;
        }

        .pill {
            padding: 8px 12px;
            border-radius: 12px;
            background: #121226;
            font-size: 13px;
            font-weight: 700;
            display: inline-block;
            margin-left: 6px;
        }

        /* TITLE */
        .title {
            text-align: center;
            margin-top: 20px;
        }

        .title h1 {
            font-family: 'Anton', sans-serif;
            font-size: 42px;
            letter-spacing: 2px;
        }

        .real {
            color: #fff;
            text-shadow: 0 0 12px cyan;
        }

        .ai {
            color: #ff3b3b;
            text-shadow: 0 0 12px red;
        }

        .subtitle {
            color: #9ca3af;
        }

        /* STAT */
        .stat {
            margin: 20px auto;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            background: #121226;
        }

        .highlight {
            color: #facc15;
            font-weight: 800;
        }

        /* IMAGE */
        .image-box {
            border-radius: 24px;
            overflow: hidden;
            margin-top: 20px;
            position: relative;
        }

        .image-box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        /* Allow easy height adjustment on mobile */
        @media (max-width: 600px) {
            .image-box img {
                height: 250px;
            }
        }

        /* FINAL OVERLAY - disabled */
        .final-overlay {
            display: none;
        }

        /* IMAGE FOOTER: counter (left) + question (center) + next button (right) */
        .image-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 4px;
            gap: 8px;
        }

        .counter {
            font-weight: 700;
            font-size: 15px;
            color: #d1d5db;
            white-space: nowrap;
        }

        .question-inline {
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            white-space: nowrap;
        }

        /* NEXT button – yellow text, no background */
        .next-btn {
            background: none;
            border: none;
            color: #facc15;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            display: none;
            white-space: nowrap;
            padding: 0;
        }

        .next-btn:hover {
            opacity: 0.8;
        }

        /* BUTTONS */
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 18px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            color: #fff;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-real {
            background: linear-gradient(#16a34a, #065f46);
        }

        .btn-ai {
            background: linear-gradient(#ef4444, #7f1d1d);
        }

        .btn small {
            display: block;
            font-size: 12px;
            opacity: 0.7;
        }

        /* RESULT CARD - Original style for CORRECT/WRONG feedback */
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            background: #121226;
            display: none;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .correct {
            background: #22c55e;
            box-shadow: 0 0 20px #22c55e;
        }

        .wrong {
            background: #ef4444;
            box-shadow: 0 0 20px #ef4444;
        }

        .desc-text {
            margin-top: 12px;
            color: #ffffff;
            font-size: 14px;
            text-align: left;
        }

        .desc-text .real-word {
            color: #22c55e;
            font-weight: 700;
        }

        .desc-text .ai-word {
            color: #ef4444;
            font-weight: 700;
        }

        /* FINAL SCORE CARD STYLES - Shows after NEXT click on 5th question */
        .final-score-container {
            margin-top: 20px;
            padding: 24px 20px;
            border-radius: 20px;
            background: #121226;
            text-align: center;
            display: none;
        }

        .score-card-title {
            font-size: 22px;
            font-weight: 800;
            color: #facc15;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0;
        }

        .start-new-btn {
            background: linear-gradient(95deg, #f97316, #ea580c);
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            color: white;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin: 15px 0 20px 0;
            transition: transform 0.1s;
            width: 80%;
            max-width: 220px;
        }

        .start-new-btn:active {
            transform: scale(0.97);
        }

        .challenge-text {
            color: #9ca3af;
            font-size: 14px;
            margin: 15px 0 10px 0;
        }

        .final-whatsapp-btn {
            background: #25D366;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            transition: opacity 0.2s;
        }

        .final-whatsapp-btn:hover {
            opacity: 0.9;
        }

        /* SHARE SECTION - Original stays */
        .share {
            margin-top: 20px;
        }

        .share-title {
            text-align: center;
            color: #9ca3af;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .share-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .copy {
            background: #1f2937;
            color: #fff;
        }

        .whatsapp {
            background: #25D366;
            color: #fff;
        }

        /* FOOTER */
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
        }

        .install-arrow {
            color: #facc15;
            font-size: 20px;
            vertical-align: middle;
            cursor: pointer;
            margin-left: 6px;
            display: inline-block;
            transition: transform 0.2s;
        }

        .install-arrow:hover {
            transform: scale(1.3);
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <div class="logo">🧠 <span class="logo-text">BRAINPLAY DAILY</span></div>
            <div>
                <span class="pill">🔥 7</span>
                <span class="pill">#12</span>
            </div>
        </div>

        <div class="title">
            <h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
            <div class="subtitle">Can you spot the difference?</div>
        </div>

        <div class="stat">
            🧩 Only <span class="highlight" id="percent">38%</span> players got this right today!
        </div>

        <div class="image-box">
            <img id="img" alt="Challenge Image">
            <div class="final-overlay" id="finalOverlay"></div>
        </div>

        <div class="image-footer" id="imageFooter">
            <span class="counter" id="counter">1/5</span>
            <span class="question-inline">🤔 Is this image Real or AI?</span>
            <button class="next-btn" id="nextBtn" onclick="next()">>> NEXT</button>
        </div>

        <div class="buttons" id="buttons">
            <button class="btn btn-real" id="btnReal" onclick="answer('real')">
                REAL <small>Looks authentic?</small>
            </button>
            <button class="btn btn-ai" id="btnAi" onclick="answer('ai')">
                AI <small>Looks generated?</small>
            </button>
        </div>

        <!-- RESULT CARD - Shows CORRECT/WRONG feedback after each answer -->
        <div class="result" id="result">
            <div class="result-row">
                <div id="circle" class="circle">✔</div>
                <h3 id="title"></h3>
            </div>
            <p id="desc" class="desc-text"></p>
        </div>

        <!-- FINAL SCORE CARD - Shows after NEXT click on 5th question (NO GAME OVER) -->
        <div class="final-score-container" id="finalScoreContainer">
            <div class="score-card-title">🏆 SCORE CARD 🏆</div>
            <div class="score-value" id="finalScoreValue">Good (3/5)</div>
            <button class="start-new-btn" id="startNewFinalBtn">✨ Start New ✨</button>
            <div class="challenge-text">🤝 Would you like to challenge your friend?</div>
            <button class="final-whatsapp-btn" id="finalWhatsappBtn">💬 Share on WhatsApp</button>
        </div>

        <!-- ORIGINAL SHARE SECTION - Kept untouched -->
        <div class="share">
            <div class="share-title">
                <svg width="16" fill="#9ca3af" viewBox="0 0 24 24">
                    <path d="M18 8a3 3 0 10-2.83-4H15a3 3 0 003 3zM6 14a3 3 0 10-2.83-4H3a3 3 0 003 3zm12 6a3 3 0 10-2.83-4H15a3 3 0 003 3zM8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" />
                </svg>
                Share your result with friends!
            </div>

            <div class="share-buttons">
                <button class="share-btn copy" onclick="copyLink()">📋 Copy Link</button>
                <button class="share-btn whatsapp" onclick="shareWA()">💬 WhatsApp</button>
            </div>
        </div>

        <div class="footer">
            🧠 Save to phone for daily challenge
            <span id="installArrow" class="install-arrow" title="Tap to install this game on your home screen">▼</span>
        </div>

    </div>

    <script>
        // ──────────────────────────────────
        //  HIGH-QUALITY BELL & BUZZ SOUNDS
        // ──────────────────────────────────
        function playCorrectSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;

                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.value = 1175;
                gain1.gain.setValueAtTime(0.4, now);
                gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
                osc1.connect(gain1).connect(ctx.destination);
                osc1.start(now);
                osc1.stop(now + 0.35);

                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = 1480;
                gain2.gain.setValueAtTime(0.25, now + 0.05);
                gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
                osc2.connect(gain2).connect(ctx.destination);
                osc2.start(now + 0.05);
                osc2.stop(now + 0.4);

                const osc3 = ctx.createOscillator();
                const gain3 = ctx.createGain();
                osc3.type = 'sine';
                osc3.frequency.value = 2349;
                gain3.gain.setValueAtTime(0.15, now + 0.1);
                gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                osc3.connect(gain3).connect(ctx.destination);
                osc3.start(now + 0.1);
                osc3.stop(now + 0.3);
            } catch (e) {}
        }

        function playWrongSound() {
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = 220;
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.linearRampToValueAtTime(0.0001, now + 0.12);
                osc.connect(gain).connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.12);

                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'square';
                osc2.frequency.value = 200;
                gain2.gain.setValueAtTime(0.25, now + 0.15);
                gain2.gain.linearRampToValueAtTime(0.0001, now + 0.28);
                osc2.connect(gain2).connect(ctx.destination);
                osc2.start(now + 0.15);
                osc2.stop(now + 0.28);
            } catch (e) {}
        }

        // ──────────────────────────────────
        //  GAME LOGIC
        // ──────────────────────────────────
        let index = 0;
        let score = 0;
        let isReal;
        let answered = false;

        const btnReal = document.getElementById('btnReal');
        const btnAi = document.getElementById('btnAi');
        const nextBtn = document.getElementById('nextBtn');
        const counterEl = document.getElementById('counter');
        const imageFooter = document.getElementById('imageFooter');
        const resultCard = document.getElementById('result');
        const finalScoreContainer = document.getElementById('finalScoreContainer');

        function disableButtons() {
            answered = true;
            btnReal.disabled = true;
            btnAi.disabled = true;
        }

        function enableButtons() {
            answered = false;
            btnReal.disabled = false;
            btnAi.disabled = false;
        }

        function getRandomImage() {
            return "https://picsum.photos/800/600?random=" + Math.random();
        }

        function load() {
            document.getElementById("img").src = getRandomImage();
            isReal = Math.random() > 0.5;
            resultCard.style.display = "none";
            counterEl.innerText = (index + 1) + "/5";
            nextBtn.style.display = "none";
            enableButtons();
        }

        function answer(choice) {
            if (answered) return;
            disableButtons();

            let correct = (choice === "real" && isReal) || (choice === "ai" && !isReal);

            let circle = document.getElementById("circle");
            let titleElement = document.getElementById("title");
            let desc = document.getElementById("desc");

            function highlightKeywords(text) {
                return text
                    .replace(/\bREAL\b/g, '<span class="real-word">REAL</span>')
                    .replace(/\bAI\b/g, '<span class="ai-word">AI</span>')
                    .replace(/\bAI-generated\b/gi, '<span class="ai-word">AI-generated</span>');
            }

            if (correct) {
                playCorrectSound();
                score++;
                circle.className = "circle correct";
                circle.innerHTML = "✔";
                titleElement.innerHTML = "CORRECT";
                if (isReal) {
                    desc.innerHTML = highlightKeywords("Good catch! This image is REAL.");
                } else {
                    desc.innerHTML = highlightKeywords("Good catch! This image is AI generated.");
                }
            } else {
                playWrongSound();
                circle.className = "circle wrong";
                circle.innerHTML = "✖";
                titleElement.innerHTML = "WRONG";
                if (isReal) {
                    desc.innerHTML = highlightKeywords("This image is REAL. The lighting, textures and details match natural patterns.");
                } else {
                    desc.innerHTML = highlightKeywords("This image is AI-generated. Look for unnatural textures and repeating patterns.");
                }
            }

            resultCard.style.display = "block";
            nextBtn.style.display = "inline-block";
        }

        function getScoreLabel(scoreValue) {
            if (scoreValue === 5) return "Brilliant";
            if (scoreValue === 4) return "Excellent";
            if (scoreValue === 3) return "Good";
            if (scoreValue === 2) return "Average";
            if (scoreValue === 1) return "Poor";
            return "Very Bad";
        }

        function next() {
            index++;
            if (index >= 5) {
                // 5th question completed, user clicked NEXT
                // Hide the CORRECT/WRONG result card completely
                resultCard.style.display = "none";
                
                // Show FINAL SCORE CARD (NO GAME OVER, NO "Play Again")
                const scoreLabel = getScoreLabel(score);
                const scoreValueElem = document.getElementById('finalScoreValue');
                scoreValueElem.innerHTML = `${scoreLabel} (${score}/5)`;
                
                finalScoreContainer.style.display = "block";
                
                // Disable REAL/AI buttons permanently
                btnReal.disabled = true;
                btnAi.disabled = true;
                nextBtn.style.display = "none";
                
                // Hide the original share section's WhatsApp button? NO, keep as is.
                // But we have separate final whatsapp button inside final score container.
            } else {
                load();
            }
        }

        function restartGame() {
            // Reset all game state
            index = 0;
            score = 0;
            answered = false;
            
            // Hide final score container
            finalScoreContainer.style.display = "none";
            
            // Restore original result card HTML (clean state)
            resultCard.innerHTML = `
                <div class="result-row">
                    <div id="circle" class="circle">✔</div>
                    <h3 id="title"></h3>
                </div>
                <p id="desc" class="desc-text"></p>
            `;
            resultCard.style.display = "none";
            
            // Reset buttons
            enableButtons();
            nextBtn.style.display = "none";
            
            // Reload first image
            load();
        }

        // Final Score Card Button Handlers
        function startNewGame() {
            restartGame();
        }
        
        function shareOnWhatsApp() {
            const scoreLabel = getScoreLabel(score);
            const message = `🎮 BrainPlay Daily - Real vs AI Game!\n\nMy final score: ${scoreLabel} (${score}/5)\n\nCan you beat my score? Play here: ${location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`);
        }

        // Attach event listeners for final card buttons
        document.getElementById('startNewFinalBtn').addEventListener('click', startNewGame);
        document.getElementById('finalWhatsappBtn').addEventListener('click', shareOnWhatsApp);

        // Copy & share functions (original)
        function copyLink() {
            navigator.clipboard.writeText(location.href);
            alert("Copied!");
        }

        function shareWA() {
            window.open("https://wa.me/?text=Play this game: " + location.href);
        }

        // Random percentage stat
        document.getElementById("percent").innerText = Math.floor(Math.random() * 50 + 30) + "%";

        // PWA install logic
        let deferredPrompt;
        const installArrow = document.getElementById('installArrow');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        installArrow.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Install prompt outcome: ${outcome}`);
                deferredPrompt = null;
            } else {
                alert(
                    "To install this game on your home screen:\n\n" +
                    "• iPhone/iPad: Tap the Share button and then 'Add to Home Screen'.\n" +
                    "• Android: Open the browser menu and select 'Add to Home screen' or 'Install'."
                );
            }
        });

        // Service worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(
                    URL.createObjectURL(
                        new Blob(
                            [
                                `self.addEventListener('install', e => { self.skipWaiting(); });
                 self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
                 self.addEventListener('fetch', e => { e.respondWith(fetch(e.request)); });`
                            ], { type: 'application/javascript' }
                        )
                    )
                ).catch((err) => console.log('SW registration failed:', err));
            });
        }

        // Start the game
        load();
    </script>

</body>
</html>
