<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BrainPlay — REAL vs AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #05050F;
      font-family: 'Inter', sans-serif;
      color: #F2F2F7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* main card — mimics the modern "BRAINPLAY" daily card */
    .challenge-card {
      max-width: 460px;
      width: 100%;
      margin: 0 auto;
      background: #0C0C1A;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }

    /* inner container keeps spacing consistent */
    .card-inner {
      padding: 24px 22px 32px;
    }

    /* header with streak + brainplay logo */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 14px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    .brand-icon {
      font-size: 22px;
      filter: drop-shadow(0 2px 4px rgba(192, 132, 252, 0.4));
    }

    .brand-text {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #E9C0FF, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .streak-badge {
      background: rgba(255, 215, 0, 0.12);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #FFDF7E;
      border: 0.5px solid rgba(255, 215, 0, 0.25);
    }

    .streak-badge span {
      font-size: 16px;
    }

    /* main title REAL vs AI */
    .versus-title {
      text-align: center;
      margin: 8px 0 10px 0;
    }

    .versus-glow {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      display: flex;
      justify-content: center;
      gap: 14px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .real-glow {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
    }

    .vs-divider {
      font-size: 36px;
      font-weight: 800;
      color: #6B6B8A;
      letter-spacing: -1px;
    }

    .ai-glow {
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 6px rgba(239, 68, 68, 0.3);
    }

    .sub-caption {
      text-align: center;
      font-size: 15px;
      color: #9F9FBB;
      margin-top: 8px;
      font-weight: 500;
    }

    /* stat pill — only 38% players got this right */
    .stat-pill {
      background: rgba(250, 204, 21, 0.1);
      border: 1px solid rgba(250, 204, 21, 0.25);
      border-radius: 100px;
      padding: 10px 16px;
      margin: 20px 0 18px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      color: #FACC15;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .stat-pill:before {
      content: "⚡";
      font-size: 16px;
    }

    /* Image container — elegant frame */
    .image-stage {
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      background: linear-gradient(145deg, #0F0F1E, #03030C);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 0.2s;
    }

    #gameImage {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: all 0.2s;
    }

    .question-label {
      margin-top: 24px;
      font-weight: 700;
      font-size: 18px;
      text-align: center;
      letter-spacing: -0.2px;
      background: rgba(255, 255, 255, 0.03);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 4px 20px;
      border-radius: 40px;
      color: #D1D1EC;
    }

    /* BUTTONS — stylish neumorphic + aggressive gradient */
    .game-actions {
      display: flex;
      gap: 16px;
      margin-top: 18px;
    }

    .btn {
      flex: 1;
      border: none;
      font-weight: 800;
      font-size: 18px;
      padding: 16px 0;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-real {
      background: linear-gradient(105deg, #1C8B3C, #0F5C28);
      color: white;
      border-bottom: 2px solid #86EFAC;
    }

    .btn-real:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 15px 25px -8px rgba(34, 197, 94, 0.5);
    }

    .btn-ai {
      background: linear-gradient(105deg, #C2410C, #9B2C1C);
      color: white;
      border-bottom: 2px solid #FCA5A5;
    }

    .btn-ai:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 15px 25px -8px rgba(239, 68, 68, 0.5);
    }

    /* result card — modern, matches "CORRECT!" style from image */
    .result-panel {
      margin-top: 20px;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 20px 16px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: none;
      animation: smoothFade 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes smoothFade {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-icon {
      margin-bottom: 10px;
    }

    .success-icon-large {
      width: 70px;
      height: 70px;
      background: radial-gradient(circle at 30% 20%, #2dd4bf, #0f766e);
      margin: 0 auto 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(45, 212, 191, 0.4);
      animation: popScale 0.4s ease-out;
    }

    @keyframes popScale {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      80% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    .result-text-main {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 8px 0 4px;
    }

    .result-explanation {
      font-size: 14px;
      color: #B9B9E0;
      max-width: 260px;
      margin: 8px auto 0;
      line-height: 1.4;
    }

    /* share row — exactly like attached design: copy + whatsapp */
    .share-row {
      margin-top: 24px;
    }

    .share-buttons {
      display: flex;
      gap: 14px;
    }

    .share-btn {
      flex: 1;
      background: #1C1C2E;
      border: none;
      padding: 12px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 15px;
      color: #EDEDFF;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      font-family: 'Inter', sans-serif;
    }

    .copy-btn {
      background: #252540;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .whatsapp-btn {
      background: linear-gradient(115deg, #25D366, #128C7E);
      border: none;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
    }

    .share-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    /* timer block mimicing 'Next challenge in 12h:22m:45s' */
    .timer-block {
      margin-top: 28px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 48px;
      padding: 16px 10px;
      text-align: center;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .timer-label {
      font-size: 14px;
      font-weight: 500;
      color: #ACACD0;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #countdown {
      font-size: 28px;
      font-weight: 800;
      font-family: monospace;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #F0F0FF, #C0C0F0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* small polish */
    .footer-note {
      font-size: 10px;
      text-align: center;
      margin-top: 18px;
      opacity: 0.5;
    }

    button:active {
      transform: scale(0.98);
    }

    @media (max-width: 450px) {
      .card-inner {
        padding: 18px 16px 28px;
      }
      .versus-glow {
        font-size: 34px;
        gap: 8px;
      }
      .btn {
        font-size: 16px;
        padding: 14px 0;
      }
      #countdown {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="challenge-card">
  <div class="card-inner">

    <!-- header: BrainPlay + Streak Challenge style -->
    <div class="game-header">
      <div class="brand">
        <span class="brand-icon">🧠</span>
        <span class="brand-text">BRAINPLAY</span>
      </div>
      <div class="streak-badge">
        🔥 <span>STREAK</span> &nbsp;7
      </div>
    </div>

    <!-- title and daily challenge vibe: REAL vs AI -->
    <div class="versus-title">
      <div class="versus-glow">
        <span class="real-glow">REAL</span>
        <span class="vs-divider">vs</span>
        <span class="ai-glow">AI</span>
      </div>
      <div class="sub-caption">CHALLENGE • DAILY #12</div>
    </div>

    <!-- Only 38% players got this right today! (exactly as image) -->
    <div class="stat-pill">
      Only 38% players got this right today!
    </div>

    <!-- image area -->
    <div class="image-stage">
      <img id="gameImage" alt="Real or AI challenge">
    </div>

    <!-- question prompt -->
    <div class="question-label">
      🤔 Is this image Real or AI?
    </div>

    <!-- action buttons REAL / AI -->
    <div class="game-actions">
      <button class="btn btn-real" onclick="check('Real')">🌿 REAL</button>
      <button class="btn btn-ai" onclick="check('AI')">✨ AI</button>
    </div>

    <!-- result dynamic panel (hidden by default) matched with CORRECT! style -->
    <div class="result-panel" id="resultBox">
      <div id="icon"></div>
      <h2 id="resultText" class="result-text-main"></h2>
      <p id="explanation" class="result-explanation"></p>
    </div>

    <!-- share row: copy link + whatsapp (matches attached design exactly) -->
    <div class="share-row">
      <div class="share-buttons">
        <button class="share-btn copy-btn" onclick="copyResult()">📋 COPY LINK</button>
        <button class="share-btn whatsapp-btn" onclick="shareWhatsApp()">💬 SHARE ON WHATSAPP</button>
      </div>
    </div>

    <!-- timer block exactly as "Next challenge in 12h:22m:45s" -->
    <div class="timer-block">
      <div class="timer-label">
        ⏳ Next challenge in
      </div>
      <div>
        <b id="countdown">--h:--m:--s</b>
      </div>
    </div>
    <div class="footer-note">BrainPlay daily — spot the difference</div>
  </div>
</div>

<script>
  // ---------- GAME LOGIC (KEPT COMPLETELY INTACT, no function changes) ----------
  let totalRounds = 3;
  let current = 0;
  let score = 0;
  let timerDuration = 5000;
  let timer = null;

  // SAFE RANDOM IMAGE (very reliable) - unchanged
  function getRandomImage() {
    return "https://picsum.photos/800/600?random=" + Math.floor(Math.random() * 100000);
  }

  // LOAD IMAGE (unchanged except keeping UI consistent)
  function load() {
    const img = document.getElementById("gameImage");
    const resultBox = document.getElementById("resultBox");

    if (!img) return;
    img.src = getRandomImage();

    // fallback (avoid blank screen)
    img.onerror = function () {
      img.src = "https://picsum.photos/800/600";
    };

    if (resultBox) resultBox.style.display = "none";
    startTimer();
  }

  // TIMER (unchanged)
  function startTimer() {
    if (timer) clearTimeout(timer);
    timer = setTimeout(nextRound, timerDuration);
  }

  // CHECK - maintains original logic (score, result panel, animations)
  function check(choice) {
    if (timer) clearTimeout(timer);

    const iconDiv = document.getElementById("icon");
    const resultTextSpan = document.getElementById("resultText");
    const explanationPara = document.getElementById("explanation");
    const resultBox = document.getElementById("resultBox");

    if (choice === "Real") {
      score++;
      if (iconDiv) {
        iconDiv.innerHTML = `
          <div class="result-icon">
            <div class="success-icon-large">
              <svg width="38" height="38" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 27 L22 35 L38 18" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </div>
          </div>`;
      }
      if (resultTextSpan) resultTextSpan.innerText = "CORRECT!";
    } else {
      if (iconDiv) {
        iconDiv.innerHTML = `
          <div class="result-icon">
            <div style="width:70px;height:70px;background:radial-gradient(circle,#ef4444,#991b1b);margin:0 auto 12px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(239,68,68,0.5);">
              <span style="font-size:34px;">✘</span>
            </div>
          </div>`;
      }
      if (resultTextSpan) resultTextSpan.innerText = "WRONG!";
    }

    if (explanationPara) explanationPara.innerText = "This image is from random internet library — lighting & texture details match real photography.";
    if (resultBox) resultBox.style.display = "block";

    setTimeout(nextRound, 1200);
  }

  // NEXT ROUND (same progression)
  function nextRound() {
    current++;
    if (current < totalRounds) {
      load();
    } else {
      endGame();
    }
  }

  // END GAME — final score display but with nicer "BRAINPLAY" style
  function endGame() {
    const resultBox = document.getElementById("resultBox");
    const iconDiv = document.getElementById("icon");
    const resultTextSpan = document.getElementById("resultText");
    const explanationPara = document.getElementById("explanation");

    if (resultBox) resultBox.style.display = "block";
    if (iconDiv) {
      iconDiv.innerHTML = `<div class="result-icon"><div style="font-size:48px;">🏆</div></div>`;
    }
    if (resultTextSpan) resultTextSpan.innerText = `🔥 Final Score: ${score}/${totalRounds}`;
    if (explanationPara) explanationPara.innerText = `Game Over — amazing observation! Share your result with friends.`;
  }

  // SHARE (unchanged exactly as original but text matches)
  function copyResult() {
    const text = `I scored ${score}/${totalRounds} 🔥 in REAL vs AI ⚡ ${location.href}`;
    navigator.clipboard.writeText(text);
    alert("✅ Result copied to clipboard!");
  }

  function shareWhatsApp() {
    const text = `I scored ${score}/${totalRounds} 🔥 in REAL vs AI challenge! Can you beat me? ${location.href}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
  }

  // CLOCK (unchanged) — next challenge countdown (midnight style original was 24h)
  function updateTimerDisplay() {
    const now = new Date();
    const next = new Date();
    next.setHours(24, 0, 0, 0);
    const diff = next - now;
    const h = Math.floor(diff / 1000 / 60 / 60);
    const m = Math.floor((diff / 1000 / 60) % 60);
    const s = Math.floor((diff / 1000) % 60);
    const countdownEl = document.getElementById("countdown");
    if (countdownEl) {
      countdownEl.innerText = `${h}h : ${m}m : ${s}s`;
    }
  }

  setInterval(updateTimerDisplay, 1000);
  updateTimerDisplay();

  // SAFE START
  window.addEventListener("load", () => {
    // reset game state for fresh start (optional but keeps original logic)
    current = 0;
    score = 0;
    load();
  });
</script>
</body>
</html>
