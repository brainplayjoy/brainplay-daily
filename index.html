<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BrainPlay Daily | Real vs AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#050510;
font-family:'Inter',sans-serif;
color:#fff;
display:flex;
justify-content:center;
padding:20px;
}

.container{max-width:520px;width:100%;}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:14px 18px;border-radius:22px;background:#0c0c18;
border:1px solid rgba(255,255,255,0.08);
}

.logo{display:flex;gap:10px;font-weight:900;}
.logo-text{
background:linear-gradient(90deg,#e879f9,#9333ea);
-webkit-background-clip:text;color:transparent;
}

.pill{
padding:8px 12px;border-radius:12px;background:#121226;
font-size:13px;font-weight:700;margin-left:6px;
}

/* TITLE */
.title{text-align:center;margin-top:20px;}
.title h1{font-family:'Anton';font-size:42px;letter-spacing:2px;}
.real{color:#fff;text-shadow:0 0 12px cyan;}
.ai{color:#ff3b3b;text-shadow:0 0 12px red;}
.subtitle{color:#9ca3af;}

/* STAT */
.stat{
margin:20px auto;padding:12px;border-radius:30px;
text-align:center;background:#121226;
}
.highlight{color:#facc15;font-weight:800;}

/* IMAGE */
.image-box{
border-radius:24px;overflow:hidden;margin-top:20px;position:relative;
}
.image-box img{
width:100%;height:300px;object-fit:cover;display:block;
}

/* GAME OVER */
.game-over-msg{
position:absolute;inset:0;background:rgba(0,0,0,0.85);
display:flex;justify-content:center;align-items:center;
font-family:'Anton';font-size:3rem;color:#ffd966;
z-index:15;border-radius:24px;
}

/* ===== NEW PROFESSIONAL SCORE CARD ===== */
.final-overlay{
position:absolute;inset:0;
background:rgba(5,5,16,0.92);
backdrop-filter:blur(20px);
display:none;
justify-content:center;
align-items:center;
z-index:20;
border-radius:24px;
}

/* CARD */
.score-card-panel{
width:85%;
max-width:320px;
background:#0f1022;
border-radius:18px;
padding:28px 20px;
text-align:center;

border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* Heading */
.score-card-heading{
font-size:14px;
letter-spacing:2px;
color:#9ca3af;
margin-bottom:12px;
}

/* Score */
.score-badge{
font-size:52px;
font-weight:900;
color:#facc15;
margin:10px 0;
text-shadow:0 0 18px rgba(250,204,21,0.5);
}

/* Message */
.score-message{
font-size:16px;
font-weight:600;
color:#e5e7eb;
margin-top:8px;
}

/* Button */
.play-again-btn{
margin-top:20px;
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-weight:800;
background:linear-gradient(90deg,#f59e0b,#ef4444);
color:#fff;
cursor:pointer;
transition:0.2s;
}

.play-again-btn:hover{
transform:scale(1.03);
}

/* FOOTER */
.image-footer{display:flex;justify-content:space-between;margin-top:10px;}
.buttons{display:flex;gap:12px;margin-top:16px;}
.btn{flex:1;padding:16px;border-radius:18px;border:none;color:#fff;font-weight:800;}
.btn-real{background:linear-gradient(#16a34a,#065f46);}
.btn-ai{background:linear-gradient(#ef4444,#7f1d1d);}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🧠 <span class="logo-text">BRAINPLAY DAILY</span></div>
</div>

<div class="title">
<h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
</div>

<div class="image-box">
<img id="img">

<div id="gameOverMsg" class="game-over-msg" style="display:none;">GAME OVER</div>

<!-- ===== UPDATED SCORE CARD ONLY ===== -->
<div class="final-overlay" id="finalOverlay">
<div class="score-card-panel">

<div class="score-card-heading">SCORE CARD</div>

<div class="score-badge" id="scoreBadge">0/5</div>

<div class="score-message" id="finalMessage"></div>

<button class="play-again-btn" id="playAgainBtn">PLAY AGAIN</button>

</div>
</div>

</div>

</div>

<script>
let score=2;
document.getElementById('finalOverlay').style.display="flex";
document.getElementById('scoreBadge').innerText=score+"/5";
document.getElementById('finalMessage').innerText="😐 Poor performance";
</script>

</body>
</html>
