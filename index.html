<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
}

.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:12px;
  margin-bottom:15px;
}

.logo {
  font-weight:800;
  font-size:18px;
}

.badge {
  background:rgba(0,0,0,0.4);
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
}

/* TITLE */
.title {
  text-align:center;
  font-size:36px;
  font-weight:800;
}

.real {color:#22c55e;}
.ai {color:#ef4444;}

.subtitle {
  text-align:center;
  color:#aaa;
  margin-bottom:10px;
}

/* SOCIAL PROOF */
.proof {
  text-align:center;
  background:rgba(255,255,255,0.05);
  padding:8px;
  border-radius:12px;
  margin-bottom:15px;
}

/* IMAGE */
.image-box img {
  width:100%;
  border-radius:16px;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* QUESTION */
.question {
  text-align:center;
  margin:12px 0;
}

/* BUTTONS */
.buttons {
  display:flex;
  gap:10px;
}

.btn {
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

.btn-real {
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

.btn-ai {
  background:linear-gradient(45deg,#ef4444,#dc2626);
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* RESULT CARD */
.result-card {
  margin-top:15px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  display:none;
}

.correct {color:#22c55e;}
.wrong {color:#ef4444;}

/* SHARE */
.share {
  margin-top:15px;
  display:flex;
  gap:10px;
}

.share button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.copy {background:#1e293b;}
.whatsapp {background:#25D366;}

/* TIMER */
.timer {
  margin-top:15px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">🧠 BrainPlay Daily</div>
  <div>
    <span class="badge">🔥 7</span>
    <span class="badge">#12</span>
  </div>
</div>

<div class="title">
  <span class="real">REAL</span> vs <span class="ai">AI</span>
</div>

<div class="subtitle">Can you spot the difference?</div>

<div class="proof">👥 Only 38% players got this right today!</div>

<div class="image-box">
  <img id="img" src="images/1.jpg">
</div>

<div class="question">Is this image Real or AI?</div>

<div class="buttons">
  <button class="btn btn-real" onclick="check('Real')">REAL</button>
  <button class="btn btn-ai" onclick="check('AI')">AI</button>
</div>

<div class="result-card" id="resultCard">
  <div id="resultText"></div>
  <div id="explanation" style="color:#ccc;font-size:14px;margin-top:5px;"></div>
</div>

<div class="share">
  <button class="copy" onclick="copyLink()">Copy Link</button>
  <button class="whatsapp" onclick="shareWhatsApp()">WhatsApp</button>
</div>

<div class="timer" id="timer"></div>

</div>

<script>

const data = {
  img:"images/1.jpg",
  answer:"Real",
  exp:"Natural shadows and realistic texture patterns."
};

function check(choice){
  const card = document.getElementById("resultCard");
  card.style.display="block";

  if(choice === data.answer){
    document.getElementById("resultText").innerHTML="✅ Correct!";
  } else {
    document.getElementById("resultText").innerHTML="❌ Wrong!";
  }

  document.getElementById("explanation").innerText=data.exp;
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
}

function shareWhatsApp(){
  window.open("https://wa.me/?text="+encodeURIComponent(window.location.href));
}

// TIMER
function updateTimer(){
  const now = new Date();
  const tomorrow = new Date();
  tomorrow.setHours(24,0,0,0);
  const diff = tomorrow - now;

  const h = Math.floor(diff/3600000);
  const m = Math.floor(diff%3600000/60000);
  const s = Math.floor(diff%60000/1000);

  document.getElementById("timer").innerText =
    `Next challenge in ${h}h ${m}m ${s}s`;
}

setInterval(updateTimer,1000);

</script>

</body>
</html>
