<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050510;
  font-family:'Inter',sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{max-width:520px;width:100%}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-radius:22px;
  background:#0c0c18;
  border:1px solid rgba(255,255,255,0.08);
}

.logo{display:flex;gap:10px;font-weight:900}

.logo-text{
  background:linear-gradient(90deg,#e879f9,#9333ea);
  -webkit-background-clip:text;
  color:transparent;
}

.pill{
  padding:8px 12px;
  border-radius:12px;
  background:#121226;
  font-size:13px;
  font-weight:700;
}

/* CATEGORY BUTTON */
.category-btn{
  background:#7c3aed;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

/* TITLE */
.title{text-align:center;margin-top:20px}

.title h1{
  font-family:'Anton',sans-serif;
  font-size:42px;
  letter-spacing:2px;
}

.real{color:#fff;text-shadow:0 0 12px cyan}
.ai{color:#ff3b3b;text-shadow:0 0 12px red}

.subtitle{color:#9ca3af}

/* STAT */
.stat{
  margin:20px auto;
  padding:12px;
  border-radius:30px;
  text-align:center;
  background:#121226;
}

.highlight{color:#facc15;font-weight:800}

/* IMAGE */
.image-box{
  border-radius:24px;
  overflow:hidden;
  margin-top:20px;
  position:relative;
}

.image-box img{
  width:100%;
  height:320px;
  object-fit:cover;
}

/* FINAL OVERLAY */
.final-overlay{
  position:absolute;
  inset:0;
  background:#050510;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.start-btn{
  margin-top:14px;
  background:orange;
  color:#fff;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

/* QUESTION */
.question{
  text-align:center;
  margin-top:18px;
  font-weight:700;
}

/* BUTTONS */
.buttons{display:flex;gap:12px;margin-top:16px}

.btn{
  flex:1;
  padding:16px;
  border-radius:18px;
  font-weight:800;
  border:none;
  cursor:pointer;
  color:#fff;
}

.btn-real{background:linear-gradient(#16a34a,#065f46)}
.btn-ai{background:linear-gradient(#ef4444,#7f1d1d)}

.btn small{display:block;font-size:12px;opacity:0.7}

/* RESULT */
.result{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:#121226;
  display:none;
}

.result-row{
  display:flex;
  align-items:center;
  gap:12px;
}

.circle{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
}

.correct{background:#22c55e;box-shadow:0 0 20px #22c55e}
.wrong{background:#ef4444;box-shadow:0 0 20px #ef4444}

.next{
  margin-left:auto;
  background:#1f2937;
  padding:10px 14px;
  border-radius:10px;
  color:#facc15;
  cursor:pointer;
  border:none;
  font-weight:700;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#121226;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

.categories{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.cat{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.cat.active{
  border:2px solid #7c3aed;
}

.popup-start{
  margin-top:15px;
  width:100%;
  padding:10px;
  background:#7c3aed;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
}

/* SHARE */
.share{margin-top:20px}
.share-buttons{display:flex;gap:10px;margin-top:10px}
.share-btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.copy{background:#1f2937;color:#fff}
.whatsapp{background:#25D366;color:#fff}

.footer{
  margin-top:20px;
  text-align:center;
  color:#9ca3af;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">🧠 <span class="logo-text">BRAINPLAY DAILY</span></div>
  <button class="category-btn" onclick="openPopup()">Category</button>
</div>

<div class="title">
  <h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
  <div class="subtitle">Can you spot the difference?</div>
</div>

<div class="stat">
  🧩 Only <span class="highlight" id="percent">38%</span> players got this right today!
</div>

<div class="image-box">
  <img id="img">

  <div class="final-overlay" id="finalOverlay">
    <h2 id="finalText"></h2>
    <button class="start-btn" onclick="restart()">Start New</button>
  </div>
</div>

<div class="question">🤔 Is this image Real or AI?</div>

<div class="buttons">
  <button class="btn btn-real" onclick="answer('real')">REAL</button>
  <button class="btn btn-ai" onclick="answer('ai')">AI</button>
</div>

<div class="result" id="result">
  <div class="result-row">
    <div id="circle" class="circle">✔</div>
    <h3 id="title"></h3>
    <button class="next" onclick="next()">>> NEXT</button>
  </div>
  <p id="desc"></p>
</div>

<div class="share">
  <div class="share-buttons">
    <button class="share-btn copy" onclick="copyLink()">📋 Copy Link</button>
    <button class="share-btn whatsapp" onclick="shareWA()">WhatsApp</button>
  </div>
</div>

<div class="footer">🧠 Save to phone for daily challenge</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Select Category</h3>
    <div class="categories" id="categories"></div>
    <button class="popup-start" onclick="startGame()">Start</button>
  </div>
</div>

<script>

let index=0,score=0,isReal;
let selectedCategory="nature";

let categories=["Plant","Flowers","Animal","Figure","Anatomy","Nature","Auto","Structure","Galaxy"];

let correctSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
let wrongSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3");

function openPopup(){
  document.getElementById("popup").style.display="flex";
  renderCategories();
}

function renderCategories(){
  let html="";
  categories.forEach(c=>{
    html+=`<div class="cat" onclick="selectCat('${c}',this)">${c}</div>`;
  });
  document.getElementById("categories").innerHTML=html;
}

function selectCat(cat,el){
  selectedCategory=cat;
  document.querySelectorAll(".cat").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
}

function startGame(){
  document.getElementById("popup").style.display="none";
  restart();
}

function getRandomImage(){
  return "https://source.unsplash.com/800x600/?"+selectedCategory+"&"+Math.random();
}

function load(){
  document.getElementById("img").src=getRandomImage();
  isReal=Math.random()>0.5;
  document.getElementById("result").style.display="none";
}

function answer(choice){
  let correct=(choice==="real"&&isReal)||(choice==="ai"&&!isReal);

  let circle=document.getElementById("circle");
  let title=document.getElementById("title");
  let desc=document.getElementById("desc");

  if(correct){
    correctSound.play();
    score++;
    circle.className="circle correct";
    circle.innerHTML="✔";
    title.innerHTML="CORRECT";
    desc.innerHTML="This image is REAL.";
  }else{
    wrongSound.play();
    circle.className="circle wrong";
    circle.innerHTML="✖";
    title.innerHTML="WRONG";
    desc.innerHTML="This image is AI-generated.";
  }

  document.getElementById("result").style.display="block";
}

function next(){
  index++;
  if(index>=5){showFinal()} else load();
}

function showFinal(){
  let text="";
  if(score<=2) text="😐 Poor ("+score+"/5)";
  else if(score<=4) text="👍 Good ("+score+"/5)";
  else text="🏆 Excellent ("+score+"/5)";

  document.getElementById("finalText").innerHTML=text;
  document.getElementById("finalOverlay").style.display="flex";
}

function restart(){
  index=0;score=0;
  document.getElementById("finalOverlay").style.display="none";
  load();
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

function shareWA(){
  window.open("https://wa.me/?text=Play this game: "+location.href);
}

document.getElementById("percent").innerText=Math.floor(Math.random()*50+30)+"%";

openPopup();

</script>

</body>
</html>
