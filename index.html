<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050510;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#fff;
}

.container{
  max-width:520px;
  width:100%;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-radius:22px;
  background:linear-gradient(180deg,#0c0c18,#090912);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 0 20px rgba(255,255,255,0.03);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  font-size:20px;
}

.logo-text{
  background:linear-gradient(90deg,#e879f9,#9333ea);
  -webkit-background-clip:text;
  color:transparent;
}

.pills{display:flex;gap:10px;}

.pill{
  padding:10px 14px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  font-weight:700;
  font-size:13px;
  backdrop-filter:blur(10px);
}

/* TITLE */
.title{
  text-align:center;
  margin-top:20px;
}

.title h1{
  font-size:56px;
  font-family:'Permanent Marker',cursive;
}

.real{
  color:#22c55e;
  text-shadow:0 0 14px #22c55e;
}
.ai{
  color:#ef4444;
  text-shadow:0 0 14px #ef4444;
}

.subtitle{
  margin-top:8px;
  color:#9ca3af;
}

/* STAT */
.stat{
  margin:20px auto;
  padding:12px 20px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(14px);
  text-align:center;
}

/* IMAGE */
.image-box{
  border-radius:26px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.image-box img{
  width:100%;
  display:block;
}

/* QUESTION */
.question{
  text-align:center;
  margin-top:18px;
  font-weight:700;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:14px;
  margin-top:16px;
}

.btn{
  flex:1;
  padding:18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  position:relative;
  color:#fff;
  font-weight:800;
  font-size:20px;
}

.btn small{
  display:block;
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
}

/* REAL */
.btn-real{
  background:linear-gradient(135deg,#16a34a,#064e3b);
  box-shadow:0 0 25px rgba(34,197,94,0.5);
}

.btn-real::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.15);
}

/* AI */
.btn-ai{
  background:linear-gradient(135deg,#ef4444,#7f1d1d);
  box-shadow:0 0 25px rgba(239,68,68,0.5);
}

.btn-ai::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.15);
}

/* RESULT */
.result{
  margin-top:20px;
  padding:20px;
  border-radius:24px;
  background:linear-gradient(145deg,#0c0c18,#12122a);
  border:1px solid rgba(255,255,255,0.08);
  display:none;
}

.result-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.result-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.circle{
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle,#22c55e,#166534);
  display:flex;
  justify-content:center;
  align-items:center;
}

.learn{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}

.result p{
  margin-top:10px;
  color:#cbd5f5;
}

/* SHARE */
.share{
  margin-top:20px;
}

.share-title{
  text-align:center;
  color:#9ca3af;
}

.share-buttons{
  display:flex;
  gap:12px;
  margin-top:10px;
}

.share-btn{
  flex:1;
  padding:14px;
  border-radius:16px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.copy{background:#1f2937;}
.whatsapp{
  background:linear-gradient(135deg,#25D366,#128C7E);
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="logo">
    🧠 <span class="logo-text">BRAINPLAY DAILY</span>
  </div>
  <div class="pills">
    <div class="pill">🔥 7</div>
    <div class="pill">📅 #12</div>
  </div>
</div>

<!-- TITLE -->
<div class="title">
  <h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
  <div class="subtitle">Can you spot the difference?</div>
</div>

<!-- STAT -->
<div class="stat">🧩 Only 38% players got this right today!</div>

<!-- IMAGE -->
<div class="image-box">
  <img src="https://picsum.photos/800/600">
</div>

<!-- QUESTION -->
<div class="question">Is this image Real or AI?</div>

<!-- BUTTONS -->
<div class="buttons">
  <button class="btn btn-real" onclick="submitChoice('real')">
    REAL
    <small>Looks authentic?</small>
  </button>
  <button class="btn btn-ai" onclick="submitChoice('ai')">
    AI
    <small>Looks generated?</small>
  </button>
</div>

<!-- RESULT -->
<div class="result" id="resultBox">
  <div class="result-top">
    <div class="result-left">
      <div class="circle">✔</div>
      <h2 id="resultTitle">CORRECT!</h2>
    </div>
    <button class="learn">💡 Learn</button>
  </div>
  <p id="resultText">This image is REAL. The lighting, textures and details match natural patterns.</p>
</div>

<!-- SHARE -->
<div class="share">
  <div class="share-title">Share your result with friends!</div>
  <div class="share-buttons">
    <button class="share-btn copy" onclick="copyLink()">COPY LINK</button>
    <button class="share-btn whatsapp" onclick="shareWhatsApp()">WHATSAPP</button>
  </div>
</div>

</div>

<script>
let isReal=Math.random()>0.5;

function submitChoice(choice){
  const box=document.getElementById("resultBox");
  const title=document.getElementById("resultTitle");
  const text=document.getElementById("resultText");

  let correct=(choice==="real"&&isReal)||(choice==="ai"&&!isReal);

  if(correct){
    title.innerHTML="CORRECT!";
    text.innerHTML=isReal
    ?"This image is REAL. Lighting and textures match natural patterns."
    :"This image is AI-generated.";
  }else{
    title.innerHTML="WRONG";
    text.innerHTML=isReal
    ?"Actually REAL image."
    :"Actually AI-generated image.";
  }

  box.style.display="block";
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

function shareWhatsApp(){
  window.open("https://wa.me/?text=Play this game: "+location.href);
}
</script>

</body>
</html>
