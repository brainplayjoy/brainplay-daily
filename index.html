<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050510;
  font-family:'Inter',sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{max-width:520px;width:100%}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-radius:20px;
  background:#0c0c18;
}

/* TITLE */
.title{text-align:center;margin-top:20px}

.title h1{
  font-family:'Anton',sans-serif;
  font-size:60px;
  letter-spacing:2px;
}

.real{
  color:#fff;
  text-shadow:0 0 12px cyan;
}
.ai{
  color:#ff3b3b;
  text-shadow:0 0 12px red;
}

.subtitle{color:#aaa}

/* STAT */
.stat{
  margin:20px;
  padding:10px;
  text-align:center;
  background:#121226;
  border-radius:20px;
}

.highlight{color:#facc15}

/* IMAGE */
.image-box{
  border-radius:20px;
  overflow:hidden;
}

.image-box img{
  width:100%;
  height:320px;
  object-fit:cover;
}

/* QUESTION */
.question{text-align:center;margin-top:16px;font-weight:700}

/* BUTTONS */
.buttons{display:flex;gap:10px;margin-top:16px}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.btn-real{background:#16a34a}
.btn-ai{background:#ef4444}

/* RESULT */
.result{
  margin-top:20px;
  padding:16px;
  background:#121226;
  border-radius:20px;
  display:none;
}

.row{
  display:flex;
  align-items:center;
  gap:12px;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

.correct{background:#22c55e}
.wrong{background:#ef4444}

.next{
  margin-left:auto;
  background:#1f2937;
  color:#facc15;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* FINAL RESULT */
.final{
  position:absolute;
  inset:0;
  background:#050510;
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  flex-direction:column;
}

.final h2{font-size:28px;margin-bottom:10px}

.start{
  margin-top:16px;
  padding:12px 18px;
  background:orange;
  color:#fff;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="title">
  <h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
  <div class="subtitle">Can you spot the difference?</div>
</div>

<div class="stat">
  Only <span class="highlight" id="percent"></span> players got this right today!
</div>

<div class="image-box">
  <img id="img">
</div>

<div class="question">🤔 Is this image Real or AI?</div>

<div class="buttons">
  <button class="btn btn-real" onclick="answer('real')">REAL</button>
  <button class="btn btn-ai" onclick="answer('ai')">AI</button>
</div>

<div class="result" id="result">
  <div class="row">
    <div id="circle" class="circle"></div>
    <h3 id="title"></h3>
    <button class="next" onclick="next()">>> NEXT</button>
  </div>
  <p id="desc"></p>
</div>

<!-- FINAL SCREEN -->
<div class="final" id="final">
  <h2 id="finalText"></h2>
  <button class="start" onclick="restart()">Start New</button>
</div>

</div>

<script>

let images=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1519125323398-675f0ddb6308",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1472214103451-9374bd1c798e"
];

let index=0;
let score=0;
let truth;

function load(){
  document.getElementById("img").src=images[index]+"?q=80&w=800";
  truth=Math.random()>0.5;
  document.getElementById("result").style.display="none";
}

function answer(choice){
  let correct=(choice==="real"&&truth)||(choice==="ai"&&!truth);

  let circle=document.getElementById("circle");
  let title=document.getElementById("title");
  let desc=document.getElementById("desc");

  if(correct){
    score++;
    circle.className="circle correct";
    circle.innerHTML="✔";
    title.innerHTML="CORRECT";
    desc.innerHTML="Natural lighting & texture = REAL.";
  }else{
    circle.className="circle wrong";
    circle.innerHTML="✖";
    title.innerHTML="WRONG";
    desc.innerHTML="Artifacts & patterns = AI generated.";
  }

  document.getElementById("result").style.display="block";
}

function next(){
  index++;
  if(index>=5){
    showFinal();
  }else{
    load();
  }
}

function showFinal(){
  let text="";
  if(score<=2) text="😐 Poor ("+score+"/5)";
  else if(score<=4) text="👍 Good ("+score+"/5)";
  else text="🏆 Excellent ("+score+"/5) 🥇";

  document.getElementById("finalText").innerHTML=text;
  document.getElementById("final").style.display="flex";
}

function restart(){
  index=0;
  score=0;
  document.getElementById("final").style.display="none";
  load();
}

/* random percent */
document.getElementById("percent").innerText=Math.floor(Math.random()*50+30)+"%";

load();

</script>

</body>
</html>
