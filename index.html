<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#050510;
font-family:'Inter',sans-serif;
color:#fff;
display:flex;
justify-content:center;
padding:20px;
}

.container{max-width:520px;width:100%;}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-radius:22px;
background:#0c0c18;
border:1px solid rgba(255,255,255,0.08);
}

.logo{display:flex;gap:10px;font-weight:900;}
.logo-text{
background:linear-gradient(90deg,#e879f9,#9333ea);
-webkit-background-clip:text;
color:transparent;
}

.pill{
padding:8px 12px;
border-radius:12px;
background:#121226;
font-size:13px;
font-weight:700;
margin-left:6px;
}

/* TITLE */
.title{text-align:center;margin-top:20px;}
.title h1{font-family:'Anton',sans-serif;font-size:42px;letter-spacing:2px;}

.real{color:#fff;text-shadow:0 0 12px cyan;}
.ai{color:#ff3b3b;text-shadow:0 0 12px red;}

.subtitle{color:#9ca3af;}

/* STAT */
.stat{
margin:20px auto;
padding:12px;
border-radius:30px;
text-align:center;
background:#121226;
}

.highlight{color:#facc15;font-weight:800;}

/* IMAGE */
.image-box{
border-radius:24px;
overflow:hidden;
margin-top:20px;
position:relative;
}

.image-box img{
width:100%;
height:300px;
object-fit:cover;
display:block;
}

/* FINAL */
.final-overlay{
position:absolute;
inset:0;
background:#050510;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
z-index:5;
}

.start-btn{
margin-top:14px;
background:orange;
color:#fff;
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* QUESTION */
.question{text-align:center;margin-top:18px;font-weight:700;}

/* BUTTONS */
.buttons{display:flex;gap:12px;margin-top:16px;}

.btn{
flex:1;
padding:16px;
border-radius:18px;
font-weight:800;
border:none;
cursor:pointer;
color:#fff;
}

.btn:disabled{opacity:.5;pointer-events:none;}

.btn-real{background:linear-gradient(#16a34a,#065f46);}
.btn-ai{background:linear-gradient(#ef4444,#7f1d1d);}

.btn small{display:block;font-size:12px;opacity:.7;}

/* RESULT */
.result{
margin-top:20px;
padding:20px;
border-radius:20px;
background:#121226;
display:none;
}

.result-row{
display:flex;
align-items:center;
gap:12px;
}

.circle{
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
flex-shrink:0;
}

.correct{background:#22c55e;box-shadow:0 0 20px #22c55e;}
.wrong{background:#ef4444;box-shadow:0 0 20px #ef4444;}

.next{
margin-left:auto;
background:#1f2937;
padding:10px 14px;
border-radius:10px;
color:#facc15;
cursor:pointer;
border:none;
font-weight:700;
}

/* 🔥 FIXED ALIGNMENT HERE */
.desc-text{
margin-top:12px;
color:#d1d5db;
font-size:14px;
text-align:left;
margin-left:72px; /* 60px icon + 12px gap */
}

/* SHARE */
.share{margin-top:20px;}

.share-title{
text-align:center;
color:#9ca3af;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.share-buttons{display:flex;gap:10px;margin-top:10px;}

.share-btn{
flex:1;
padding:12px;
border-radius:12px;
border:none;
font-weight:700;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
cursor:pointer;
}

.copy{background:#1f2937;color:#fff;}
.whatsapp{background:#25D366;color:#fff;}

.footer{
margin-top:20px;
text-align:center;
color:#9ca3af;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">
<h1><span class="real">REAL</span> vs <span class="ai">AI</span></h1>
<div class="subtitle">Can you spot the difference?</div>
</div>

<div class="image-box">
<img id="img">
</div>

<div class="buttons">
<button class="btn btn-real" onclick="answer('real')">REAL</button>
<button class="btn btn-ai" onclick="answer('ai')">AI</button>
</div>

<div class="result" id="result">
<div class="result-row">
<div id="circle" class="circle">✔</div>
<h3 id="title"></h3>
<button class="next" onclick="load()">NEXT</button>
</div>
<p id="desc" class="desc-text"></p>
</div>

</div>

<script>
let isReal;

function load(){
document.getElementById("img").src="https://picsum.photos/800/600?random="+Math.random();
isReal=Math.random()>0.5;
document.getElementById("result").style.display="none";
}

function answer(choice){
let correct=(choice==="real"&&isReal)||(choice==="ai"&&!isReal);

let circle=document.getElementById("circle");
let title=document.getElementById("title");
let desc=document.getElementById("desc");

if(correct){
circle.className="circle correct";
circle.innerHTML="✔";
title.innerHTML="CORRECT";
desc.innerHTML="Good catch! This image is "+(isReal?"REAL":"AI generated")+".";
}else{
circle.className="circle wrong";
circle.innerHTML="✖";
title.innerHTML="WRONG";
desc.innerHTML=isReal
?"This image is REAL. The lighting and textures are natural."
:"This image is AI-generated. Look for unnatural textures and repeating patterns.";
}

document.getElementById("result").style.display="block";
}

load();
</script>

</body>
</html>
