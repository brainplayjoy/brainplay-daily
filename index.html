<script>

// SETTINGS
let totalRounds = 3;
let current = 0;
let score = 0;
let timerDuration = 5000;
let timer;

// RANDOM UNSPLASH IMAGE
function getRandomImage(){
return `https://source.unsplash.com/800x600/?nature,landscape&sig=${Math.random()}`;
}

// LOAD IMAGE
function load(){
document.getElementById("gameImage").src = getRandomImage();
document.getElementById("resultBox").style.display = "none";
startTimer();
}

// TIMER START
function startTimer(){
clearTimeout(timer);

timer = setTimeout(()=>{
nextRound();
}, timerDuration);
}

// CHECK ANSWER
function check(choice){
clearTimeout(timer);

// ⚠️ For now: Unsplash images treated as REAL
if(choice === "Real"){
score++;

document.getElementById("icon").innerHTML=`
<div class="success-icon">
<svg viewBox="0 0 52 52">
<path d="M14 27 L22 35 L38 18"/>
</svg>
</div>
`;

document.getElementById("resultText").innerText="CORRECT!";
}else{
document.getElementById("icon").innerHTML="";
document.getElementById("resultText").innerText="WRONG!";
}

document.getElementById("explanation").innerText="Auto image from internet (demo mode)";
document.getElementById("resultBox").style.display="block";

// move next after 1.2s
setTimeout(nextRound,1200);
}

// NEXT ROUND
function nextRound(){
current++;

if(current < totalRounds){
load();
}else{
endGame();
}
}

// END GAME
function endGame(){
document.getElementById("resultBox").style.display="block";
document.getElementById("icon").innerHTML="";
document.getElementById("resultText").innerText=`🔥 Final Score: ${score}/${totalRounds}`;
document.getElementById("explanation").innerText="Game Over";
}

// SHARE
function copyResult(){
let text=`I scored ${score}/${totalRounds} 🔥 ${location.href}`;
navigator.clipboard.writeText(text);
alert("Copied!");
}

function shareWhatsApp(){
let text=`I scored ${score}/${totalRounds} 🔥 ${location.href}`;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// TIMER (your existing countdown stays same)
function timerClock(){
let now=new Date();
let next=new Date();
next.setHours(24,0,0,0);

let diff=next-now;

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
`${h}h : ${m}m : ${s}s`;
}

setInterval(timerClock,1000);

// START GAME
load();

</script>
