<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BrainPlay Daily — Real vs AI</title>
  <!-- Google Fonts: Poppins as primary match image style -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0A0F1E, #02050F);
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* main card — matches the glass/dark look from the image */
    .game-container {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      background: rgba(6, 12, 24, 0.65);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 24px 20px 28px;
      box-shadow: 0 30px 45px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08);
      transition: all 0.2s;
    }

    /* ----- TOP BAR : STREAK & CHALLENGE #12 (exactly like image) ----- */
    .top-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border-radius: 100px;
      padding: 8px 12px 8px 20px;
      margin-bottom: 28px;
      border: 0.5px solid rgba(255,255,255,0.1);
    }

    .brainplay-logo {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.3px;
      background: linear-gradient(120deg, #FFFFFF, #A5B4FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .right-badges {
      display: flex;
      gap: 12px;
    }

    .badge-streak {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #FACC15;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 0.5px solid rgba(250,204,21,0.3);
      letter-spacing: 0.2px;
    }

    .badge-challenge {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      color: #CBD5E6;
    }

    /* ----- MAIN TITLE REAL vs AI (big & bold) ----- */
    .versus-title {
      text-align: center;
      font-size: 2.7rem;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .real-word {
      background: linear-gradient(135deg, #4ADE80, #16A34A);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(74,222,128,0.3);
    }
    .ai-word {
      background: linear-gradient(135deg, #F87171, #DC2626);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px rgba(239,68,68,0.3);
    }

    .sub-caption {
      text-align: center;
      font-weight: 500;
      font-size: 0.9rem;
      color: #9CA3AF;
      margin-top: -6px;
      margin-bottom: 16px;
    }

    /* ----- STATS BANNER (🔥 Only 38% players got this right today!) ----- */
    .stats-badge {
      background: rgba(255,255,255,0.05);
      border-radius: 100px;
      padding: 10px 14px;
      margin: 8px 0 18px 0;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(4px);
      border: 0.5px solid rgba(255,255,255,0.08);
    }
    .fire-emoji {
      font-size: 1rem;
    }

    /* ----- IMAGE ZONE (dynamic by user) ----- */
    .image-frame {
      background: #030712;
      border-radius: 28px;
      overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 16px 28px -12px black;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .game-image {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: transform 0.2s ease;
    }
    .game-image:hover {
      transform: scale(1.01);
    }

    /* ----- Question + "Looks authentic? / Looks generated?" tags (exact match) ----- */
    .question-row {
      text-align: center;
      font-weight: 700;
      font-size: 1.35rem;
      margin: 12px 0 8px 0;
      letter-spacing: -0.2px;
    }

    .duality-hint {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 18px;
    }
    .hint-tag {
      background: rgba(255,255,255,0.03);
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #B9C8FF;
      letter-spacing: 0.3px;
    }
    .left-hint {
      border-left: 2px solid #4ADE80;
      padding-left: 12px;
    }
    .right-hint {
      border-right: 2px solid #F87171;
      padding-right: 12px;
    }

    /* ----- BUTTONS (REAL / AI) ----- */
    .action-buttons {
      display: flex;
      gap: 14px;
      margin: 6px 0 20px 0;
    }
    .btn {
      flex: 1;
      border: none;
      padding: 14px 0;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-real {
      background: linear-gradient(100deg, #22C55E, #15803D);
      color: white;
      box-shadow: 0 8px 18px rgba(34,197,94,0.25);
    }
    .btn-ai {
      background: linear-gradient(100deg, #EF4444, #B91C1C);
      color: white;
      box-shadow: 0 8px 18px rgba(239,68,68,0.25);
    }
    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5);
    }
    .btn:active {
      transform: translateY(1px);
    }

    /* ----- RESULT CARD (CORRECT! + explanation) exactly like design ----- */
    .result-card {
      background: rgba(12, 20, 30, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1rem 1.2rem;
      margin: 0 0 18px 0;
      border: 1px solid rgba(255,255,255,0.15);
      display: none;
    }
    .result-status {
      font-weight: 800;
      font-size: 1.35rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .correct-status {
      color: #4ADE80;
    }
    .wrong-status {
      color: #F87171;
    }
    .explanation {
      color: #CBD5E6;
      font-size: 0.82rem;
      line-height: 1.4;
      border-left: 2px solid #3B82F6;
      padding-left: 12px;
      margin-top: 6px;
    }

    /* ----- SHARE SECTION (exactly: Share your result with friends! + buttons) ----- */
    .share-headline {
      text-align: center;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      color: #A5B4FC;
      margin: 12px 0 12px 0;
    }
    .share-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .share-item {
      flex: 1;
      background: #1E293B;
      border: none;
      padding: 12px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.8rem;
      color: #F1F5F9;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .wa-share {
      background: #25D366;
      color: #0F2B1D;
    }
    .share-item:hover {
      opacity: 0.9;
      transform: scale(0.97);
    }

    /* ----- TIMER BLOCK (Next challenge in 12h : 22m : 45s) ----- */
    .timer-area {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 60px;
      text-align: center;
      padding: 10px 12px;
      font-family: 'Poppins', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      color: #FACC15;
      border: 0.5px solid rgba(250,204,21,0.35);
      backdrop-filter: blur(2px);
    }
    .timer-prefix {
      font-weight: 500;
      font-size: 0.7rem;
      color: #94A3B8;
      margin-right: 8px;
    }
    .timer-digits {
      letter-spacing: 1px;
    }

    /* micro spacing */
    .hidden {
      display: none;
    }
    footer {
      text-align: center;
      font-size: 0.6rem;
      color: #334155;
      margin-top: 14px;
    }

    @media (max-width: 480px) {
      .game-container {
        padding: 18px 16px 22px;
      }
      .versus-title {
        font-size: 2.2rem;
      }
      .btn {
        font-size: 1rem;
        padding: 12px 0;
      }
      .duality-hint {
        gap: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="game-container">
  <!-- top bar: BRAINPLAY DAILY + STREAK 7 + CHALLENGE #12 -->
  <div class="top-strip">
    <div class="brainplay-logo">🧠 BRAINPLAY DAILY</div>
    <div class="right-badges">
      <span class="badge-streak">🔥 STREAK 7</span>
      <span class="badge-streak badge-challenge">#12</span>
    </div>
  </div>

  <!-- MAIN TITLE: REAL vs AI -->
  <div class="versus-title">
    <span class="real-word">REAL</span> vs <span class="ai-word">AI</span>
  </div>
  <div class="sub-caption">Can you spot the difference?</div>

  <!-- STATS BANNER: exactly "🔥 Only 38% players got this right today!" -->
  <div class="stats-badge">
    <span class="fire-emoji">🔥</span> Only <strong>38%</strong> players got this right today!
  </div>

  <!-- DYNAMIC IMAGE (user can replace URL) -->
  <div class="image-frame">
    <img id="mainGameImage" class="game-image" alt="Real vs AI challenge" src="https://picsum.photos/id/20/600/450" loading="eager">
  </div>

  <!-- QUESTION LINE -->
  <div class="question-row">📸 Is this image Real or AI?</div>

  <!-- "Looks authentic? / Looks generated?" TAGS exactly as reference -->
  <div class="duality-hint">
    <span class="hint-tag left-hint">✅ Looks authentic?</span>
    <span class="hint-tag right-hint">⚡ Looks generated?</span>
  </div>

  <!-- REAL & AI BUTTONS -->
  <div class="action-buttons">
    <button class="btn btn-real" id="realChoiceBtn">✅ REAL</button>
    <button class="btn btn-ai" id="aiChoiceBtn">❌ AI</button>
  </div>

  <!-- RESULT CARD (hidden initially, appears after guess) -->
  <div id="resultCard" class="result-card">
    <div id="resultStatusText" class="result-status"></div>
    <div id="explanationText" class="explanation"></div>
  </div>

  <!-- SHARE HEADLINE + buttons: COPY LINK & SHARE ON WHATSAPP -->
  <div class="share-headline">✨ Share your result with friends! ✨</div>
  <div class="share-buttons">
    <button class="share-item" id="copyLinkBtn">🔗 COPY LINK</button>
    <button class="share-item wa-share" id="whatsappShareBtn">💬 SHARE ON WHATSAPP</button>
  </div>

  <!-- TIMER: Next challenge in 12h : 22m : 45s style -->
  <div class="timer-area">
    <span class="timer-prefix">⏳ NEXT CHALLENGE IN</span>
    <span id="countdownClock" class="timer-digits">--h : --m : --s</span>
  </div>
  <footer>daily refresh — new image every 24h</footer>
</div>

<script>
  // ============================================================
  // Game configuration – exact match with reference image 1000161868
  // The central image can be changed any time (user uploads new url)
  // We keep a realistic example but the answer and explanation 
  // must match the image content. For demo, current image = real photo.
  // You can modify both "imageUrl" and "correctAnswer" + explanation.
  // ============================================================

  // **** CHANGE THIS IMAGE URL TO YOUR OWN UPLOADED IMAGE ****
  // The current URL is a high-res authentic photo (real dog portrait)
  // but you can replace it with any image (local or hosted).
  const GAME = {
    // Used a beautiful natural photograph with realistic lighting
    imageUrl: "https://images.pexels.com/photos/1108099/pexels-photo-1108099.jpeg?auto=compress&cs=tinysrgb&w=600",
    // The answer must be either "Real" or "AI" based on the image:
    correctAnswer: "Real",
    // Explanation text that appears in the result card (style from reference)
    explanationMsg: "This image is REAL. The lighting, textures and details match natural patterns. Look at the organic shadows, consistent skin tones, and natural depth — all signs of a genuine photograph."
  };

  // Optional fallback in case primary image fails (still a real image)
  const FALLBACK_IMAGE = "https://images.pexels.com/photos/2071873/pexels-photo-2071873.jpeg?auto=compress&cs=tinysrgb&w=600";

  // DOM elements
  const imgElement = document.getElementById('mainGameImage');
  const realBtn = document.getElementById('realChoiceBtn');
  const aiBtn = document.getElementById('aiChoiceBtn');
  const resultCardDiv = document.getElementById('resultCard');
  const resultStatusSpan = document.getElementById('resultStatusText');
  const explanationPara = document.getElementById('explanationText');

  // Helper: Show result after user makes a guess
  function revealResult(selectedOption) {
    const isCorrect = (selectedOption === GAME.correctAnswer);
    
    // Build status content (exactly like CORRECT! or ❌ WRONG! but maintain style)
    if (isCorrect) {
      resultStatusSpan.innerHTML = '✅ CORRECT!';
      resultStatusSpan.className = 'result-status correct-status';
    } else {
      resultStatusSpan.innerHTML = '❌ WRONG!';
      resultStatusSpan.className = 'result-status wrong-status';
    }
    // Explanation text always shows the description (lighting, textures)
    explanationPara.innerText = GAME.explanationMsg;
    
    // display result card with smooth reveal
    resultCardDiv.style.display = 'block';
    // optional auto-scroll into view for better UX
    resultCardDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Attach event listeners
  realBtn.addEventListener('click', () => revealResult('Real'));
  aiBtn.addEventListener('click', () => revealResult('AI'));

  // Set image and if error, fallback to reliable real photo
  imgElement.src = GAME.imageUrl;
  imgElement.onerror = () => {
    imgElement.src = FALLBACK_IMAGE;
    // keep answer consistency (fallback image is also real photograph)
  };

  // ========== TIMER: EXACT FORMAT "12h : 22m : 45s" ==========
  // Daily reset at midnight local time -> shows countdown like 12h : 22m : 45s
  function getNextMidnight() {
    const now = new Date();
    const nextMidnight = new Date(now);
    nextMidnight.setHours(24, 0, 0, 0);
    return nextMidnight;
  }

  function updateCountdownTimer() {
    const now = new Date();
    const target = getNextMidnight();
    let diffMs = target - now;
    
    if (diffMs <= 0) {
      // edge: recalc for next day
      const tomorrow = new Date(now);
      tomorrow.setDate(now.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      diffMs = tomorrow - now;
      if (diffMs <= 0) {
        document.getElementById('countdownClock').innerText = '0h : 0m : 0s';
        return;
      }
    }
    
    const hours = Math.floor(diffMs / 3600000);
    const minutes = Math.floor((diffMs % 3600000) / 60000);
    const seconds = Math.floor((diffMs % 60000) / 1000);
    
    // format exactly "12h : 22m : 45s" with spaces around colons
    document.getElementById('countdownClock').innerHTML = `${hours}h : ${minutes}m : ${seconds}s`;
  }
  
  // update timer immediately and every second
  updateCountdownTimer();
  setInterval(updateCountdownTimer, 1000);

  // ========== SHARE FUNCTIONALITY ==========
  // COPY LINK (copies current page URL or fallback link)
  function getShareableURL() {
    // Use actual page URL, if running in local file or sandbox fallback to a demo link
    if (window.location.href && !window.location.href.includes('about:blank') && window.location.href !== 'about:blank') {
      return window.location.href;
    }
    return "https://brainplaydaily.com/challenge/real-vs-ai";
  }

  async function handleCopyLink() {
    const link = getShareableURL();
    try {
      await navigator.clipboard.writeText(link);
      const copyBtn = document.getElementById('copyLinkBtn');
      const originalText = copyBtn.innerHTML;
      copyBtn.innerHTML = '✓ COPIED!';
      setTimeout(() => {
        copyBtn.innerHTML = originalText;
      }, 1800);
    } catch (err) {
      alert('⚠️ Press Ctrl+C to copy the link: ' + link);
    }
  }

  function handleWhatsAppShare() {
    const shareUrl = getShareableURL();
    const shareMessage = `🧠 BRAINPLAY DAILY ✨\nCan YOU spot the difference? I just played Real vs AI — only 38% got it right! 🔥\nTry the challenge: ${shareUrl}`;
    const encodedMsg = encodeURIComponent(shareMessage);
    window.open(`https://wa.me/?text=${encodedMsg}`, '_blank');
  }

  document.getElementById('copyLinkBtn').addEventListener('click', handleCopyLink);
  document.getElementById('whatsappShareBtn').addEventListener('click', handleWhatsAppShare);

  // ========== Additional polishing to match exact look ==========
  // Ensure result card starts hidden
  resultCardDiv.style.display = 'none';

  // small dynamic: if user clicks multiple times it updates explanation + status.
  // All consistent with reference UI.

  // EXTRA: make the image dynamic per user request – just change GAME.imageUrl variable
  // No extra hill picture; we used a natural real image as placeholder but user can replace.
  console.log('BrainPlay | Real vs AI — UI matches image 1000161868 (streak, tags, timer format)');

  // Force style for timer text to look exactly as "12h : 22m : 45s"
  // In case of weird numbers digits we keep same.
  // Additionally we embed the "Looks authentic? / Looks generated?" exactly as reference.
  
  // Optional: if the user modifies the image and answer needs to be changed,
  // they can edit GAME.correctAnswer and GAME.explanationMsg.
  // For demonstration we keep it REAL because the placeholder images are real.
  // ========== End ==========
</script>
</body>
</html>
