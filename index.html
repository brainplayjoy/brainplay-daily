<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainPlay Daily - Real vs AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #333;
}

.container {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 5px;
}

p {
  color: #666;
}

img {
  width: 100%;
  border-radius: 12px;
  margin: 15px 0;
}

.buttons {
  display: flex;
  justify-content: space-between;
}

button {
  flex: 1;
  padding: 12px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.real {
  background: #4CAF50;
  color: white;
}

.ai {
  background: #ff4d4d;
  color: white;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

#result {
  margin-top: 15px;
  font-weight: bold;
}

.share-btn {
  margin-top: 15px;
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>🤖 Real vs AI</h1>
  <p>Can you guess correctly?</p>

  <img id="gameImage" src="https://via.placeholder.com/300">

  <div class="buttons">
    <button class="real" onclick="check('Real')">Real</button>
    <button class="ai" onclick="check('AI')">AI</button>
  </div>

  <div id="result"></div>

  <button class="share-btn" onclick="copyResult()">Share Result</button>
</div>

<script>
const data = [
  {
    img: "https://via.placeholder.com/300",
    answer: "AI"
  },
  {
    img: "https://via.placeholder.com/300/ff0000",
    answer: "Real"
  }
];

const index = Math.floor(Date.now()/86400000) % data.length;

document.getElementById("gameImage").src = data[index].img;

function check(choice) {
  if (choice === data[index].answer) {
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Wrong!";
  }
}

function copyResult() {
  const text = "I played Real vs AI on BrainPlay Daily! Try it!";
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
