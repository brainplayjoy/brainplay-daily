<!DOCTYPE html>
<html>
<head>
  <title>BrainPlay Daily - Real vs AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }
    img {
      width: 300px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🤖 Real vs AI</h1>
<p>Can you guess correctly?</p>

<img id="gameImage" src="https://via.placeholder.com/300">

<br>

<button onclick="check('Real')">Real</button>
<button onclick="check('AI')">AI</button>

<p id="result"></p>

<button onclick="copyResult()">Share Result</button>

<script>
const data = [
  {
    img: "https://via.placeholder.com/300",
    answer: "AI"
  },
  {
    img: "https://via.placeholder.com/300/ff0000",
    answer: "Real"
  }
];

const index = Math.floor(Date.now()/86400000) % data.length;

document.getElementById("gameImage").src = data[index].img;

function check(choice) {
  if (choice === data[index].answer) {
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Wrong!";
  }
}

function copyResult() {
  const text = "I played Real vs AI on BrainPlay Daily! Try it!";
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
