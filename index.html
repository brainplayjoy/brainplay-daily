<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrainPlay Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
color:#fff;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#0b1220;
padding:12px;
border-radius:16px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo{
font-weight:800;
font-size:18px;
}

.stats{
display:flex;
gap:10px;
}

.stat-box{
background:#111827;
padding:8px 12px;
border-radius:10px;
font-size:12px;
}

/* TITLE */
.title{
text-align:center;
margin:20px 0;
}

.title h1{
font-size:32px;
margin:0;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.sub{
color:#9ca3af;
}

/* PERCENT BOX */
.percent{
margin:10px auto;
background:#111827;
padding:10px;
border-radius:20px;
width:80%;
text-align:center;
color:#facc15;
font-size:14px;
}

/* IMAGE */
.image-box img{
width:100%;
border-radius:16px;
box-shadow:0 0 25px rgba(0,0,0,0.7);
}

/* BUTTONS */
.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.real{
background:linear-gradient(45deg,#22c55e,#16a34a);
color:#fff;
}

.ai{
background:linear-gradient(45deg,#ef4444,#dc2626);
color:#fff;
}

button:hover{
transform:scale(1.05);
}

/* PROGRESS BAR */
.progress-bar{
height:8px;
background:#1f2937;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:.4s;
}

/* RESULT CARD */
.result-card{
margin-top:15px;
background:#0b1220;
padding:15px;
border-radius:14px;
display:none;
}

.correct{
color:#22c55e;
font-weight:700;
}

.wrong{
color:#ef4444;
font-weight:700;
}

/* SHARE */
.share{
margin-top:20px;
}

.share-title{
margin-bottom:10px;
color:#cbd5f5;
}

.share-buttons{
display:flex;
gap:10px;
}

.copy{
background:#1e293b;
color:#fff;
}

.whatsapp{
background:linear-gradient(45deg,#25D366,#128C7E);
color:#fff;
box-shadow:0 0 10px rgba(37,211,102,0.6);
}

/* TIMER */
.timer{
margin-top:20px;
background:#0b1220;
padding:15px;
border-radius:14px;
text-align:center;
}

/* INSTALL BUTTON */
.install{
margin-top:20px;
background:#6366f1;
color:#fff;
padding:12px;
border-radius:12px;
width:100%;
font-weight:700;
display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<div class="logo">🧠 BrainPlay</div>
<div class="stats">
<div class="stat-box">🔥 7</div>
<div class="stat-box">#12</div>
</div>
</div>

<!-- TITLE -->
<div class="title">
<h1><span class="green">REAL</span> vs <span class="red">AI</span></h1>
<div class="sub">Can you spot the difference?</div>
</div>

<div class="percent">Only 38% players got this right today!</div>

<!-- PROGRESS BAR -->
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<!-- IMAGE -->
<div class="image-box">
<img id="gameImage">
</div>

<!-- BUTTONS -->
<div class="buttons">
<button class="real" onclick="check('Real')">REAL</button>
<button class="ai" onclick="check('AI')">AI</button>
</div>

<!-- RESULT -->
<div class="result-card" id="resultCard">
<div id="resultText"></div>
<div id="explanation"></div>
</div>

<!-- SHARE -->
<div class="share">
<div class="share-title">Share your result</div>
<div class="share-buttons">
<button class="copy" onclick="copyResult()">Copy</button>
<button class="whatsapp" onclick="shareWhatsApp()">WhatsApp</button>
</div>
</div>

<!-- TIMER -->
<div class="timer">
Next challenge in <br>
<b id="countdown"></b>
</div>

<!-- INSTALL -->
<button class="install" id="installBtn">📲 Add to Home Screen</button>

</div>

<script>

// DATA
const data=[
{img:"images/1.jpg",answer:"Real",exp:"Natural lighting and imperfections"},
{img:"images/2.jpg",answer:"AI",exp:"Too smooth and artificial"},
{img:"images/3.jpg",answer:"AI",exp:"Unrealistic perfection"},
{img:"images/4.jpg",answer:"Real",exp:"Natural depth & shadows"}
];

// DAILY ROTATION
const baseIndex=Math.floor(Date.now()/86400000)%data.length;

let questions=[
data[baseIndex],
data[(baseIndex+1)%data.length],
data[(baseIndex+2)%data.length]
];

let current=0,score=0;

function loadQuestion(){
document.getElementById("gameImage").src=questions[current].img;
document.getElementById("resultCard").style.display="none";

// update progress bar
let percent=((current)/3)*100;
document.getElementById("progressFill").style.width=percent+"%";
}

function check(choice){
let q=questions[current];

let resultText=document.getElementById("resultText");

if(choice===q.answer){
score++;
resultText.innerHTML="<div class='correct'>✅ Correct</div>";
}else{
resultText.innerHTML="<div class='wrong'>❌ Wrong</div>";
}

document.getElementById("explanation").innerText=q.exp;
document.getElementById("resultCard").style.display="block";

setTimeout(()=>{
current++;
if(current<3){
loadQuestion();
}else{
finishGame();
}
},1200);
}

function finishGame(){
document.getElementById("progressFill").style.width="100%";
document.getElementById("resultText").innerHTML=`🔥 You scored ${score}/3`;
}

// SHARE
function copyResult(){
let text=`I scored ${score}/3 🔥 Play now: ${location.href}`;
navigator.clipboard.writeText(text);
alert("Copied!");
}

function shareWhatsApp(){
let text=`I scored ${score}/3 🔥 Play now: ${location.href}`;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// COUNTDOWN
function updateTimer(){
let now=new Date();
let next=new Date();
next.setHours(24,0,0,0);

let diff=next-now;

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
`${h}h : ${m}m : ${s}s`;
}

setInterval(updateTimer,1000);

// PWA INSTALL
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick=()=>{
deferredPrompt.prompt();
};

loadQuestion();

</script>

</body>
</html>
